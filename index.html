<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Family Health Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
/* ════ THEME SYSTEM ════════════════════════ */
/* ios = iOS 26 Liquid Glass */
/* mat = Google Material You / Expressive   */
/* win = Windows Fluent / Mica              */

/* ── iOS 26 Dark (default) ── */
:root,
[data-t="ios"][data-m="dark"] {
  --bg:#07070F;--bg2:#101018;
  --card:rgba(255,255,255,.07);
  --card2:rgba(255,255,255,.10);
  --card3:rgba(255,255,255,.14);
  --border:rgba(255,255,255,.11);
  --border2:rgba(255,255,255,.22);
  --acc:#32D74B;--acc2:#0A84FF;--acc3:#BF5AF2;
  --pink:#FF375F;--orange:#FF9F0A;--yellow:#FFD60A;
  --red:#FF453A;--green:#32D74B;--purple:#BF5AF2;
  --text:#F5F5F7;--sub:#EBEBF5CC;--muted:#8E8E93;--muted2:#48484A;
  --sh:0 8px 32px rgba(0,0,0,.55);
  --glass:rgba(18,18,26,.82);
  --r:16px;--rs:12px;--rx:10px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  --mono:"SF Mono","Menlo",monospace;
}
[data-t="ios"][data-m="light"] {
  --bg:#F2F2F7;--bg2:#FFFFFF;
  --card:rgba(255,255,255,.75);
  --card2:rgba(209,209,214,.5);
  --card3:rgba(255,255,255,.9);
  --border:rgba(60,60,67,.18);
  --border2:rgba(60,60,67,.32);
  --acc:#34C759;--acc2:#007AFF;--acc3:#AF52DE;
  --pink:#FF2D55;--orange:#FF9500;--yellow:#FFCC00;
  --red:#FF3B30;--green:#34C759;--purple:#AF52DE;
  --text:#1C1C1E;--sub:#3C3C4399;--muted:#6C6C70;--muted2:#AEAEB2;
  --sh:0 4px 20px rgba(0,0,0,.12);
  --glass:rgba(242,242,247,.85);
  --r:16px;--rs:12px;--rx:10px;
  --font:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",sans-serif;
  --mono:"SF Mono","Menlo",monospace;
}

/* ── Material You Dark ── */
[data-t="mat"][data-m="dark"] {
  --bg:#141218;--bg2:#1D1B20;
  --card:#211F26;--card2:#2B2930;--card3:#332F38;
  --border:#433E4A;--border2:#56505E;
  --acc:#D0BCFF;--acc2:#80CBC4;--acc3:#F48FB1;
  --pink:#F48FB1;--orange:#FFAB40;--yellow:#FFE57F;
  --red:#EF9A9A;--green:#A5D6A7;--purple:#D0BCFF;
  --text:#E6E1E5;--sub:#CAC4D0;--muted:#938F99;--muted2:#49454F;
  --sh:0 8px 24px rgba(0,0,0,.5);
  --glass:#1D1B20;
  --r:28px;--rs:20px;--rx:12px;
  --font:"Google Sans","Roboto Flex","Roboto",sans-serif;
  --mono:"Roboto Mono","Courier New",monospace;
}
[data-t="mat"][data-m="light"] {
  --bg:#FFFBFE;--bg2:#F7F2FA;
  --card:#FFFBFE;--card2:#ECE6F0;--card3:#F3EDF7;
  --border:#CAC4D0;--border2:#A4A0AB;
  --acc:#6750A4;--acc2:#006A6A;--acc3:#8B5CF6;
  --pink:#B5179E;--orange:#8B4513;--yellow:#7A6000;
  --red:#B3261E;--green:#386A20;--purple:#6750A4;
  --text:#1C1B1F;--sub:#49454F;--muted:#79747E;--muted2:#A8A3AF;
  --sh:0 2px 12px rgba(0,0,0,.1);
  --glass:#F7F2FA;
  --r:28px;--rs:20px;--rx:12px;
  --font:"Google Sans","Roboto Flex","Roboto",sans-serif;
  --mono:"Roboto Mono","Courier New",monospace;
}

/* ── Fluent Dark ── */
[data-t="win"][data-m="dark"] {
  --bg:#202020;--bg2:#2C2C2C;
  --card:#2C2C2C;--card2:#323232;--card3:#383838;
  --border:#454545;--border2:#5C5C5C;
  --acc:#60CDFF;--acc2:#60CDFF;--acc3:#C264FE;
  --pink:#F587C8;--orange:#FCA044;--yellow:#FCE100;
  --red:#F87171;--green:#6CCB5F;--purple:#C264FE;
  --text:#FFFFFF;--sub:#FFFFFFCC;--muted:#9D9D9D;--muted2:#636363;
  --sh:0 8px 28px rgba(0,0,0,.6),0 2px 8px rgba(0,0,0,.4);
  --glass:rgba(44,44,44,.9);
  --r:8px;--rs:6px;--rx:4px;
  --font:"Segoe UI Variable","Segoe UI",system-ui,sans-serif;
  --mono:"Cascadia Code","Consolas",monospace;
}
[data-t="win"][data-m="light"] {
  --bg:#F3F3F3;--bg2:#FBFBFB;
  --card:#FFFFFF;--card2:#F0F0F0;--card3:#E8E8E8;
  --border:#E0E0E0;--border2:#C8C8C8;
  --acc:#0067C0;--acc2:#0067C0;--acc3:#8764B8;
  --pink:#E3008C;--orange:#CA5010;--yellow:#B86F00;
  --red:#C42B1C;--green:#107C10;--purple:#8764B8;
  --text:#1A1A1A;--sub:#444444;--muted:#767676;--muted2:#BBBBBB;
  --sh:0 2px 8px rgba(0,0,0,.1),0 8px 24px rgba(0,0,0,.07);
  --glass:rgba(251,251,251,.9);
  --r:8px;--rs:6px;--rx:4px;
  --font:"Segoe UI Variable","Segoe UI",system-ui,sans-serif;
  --mono:"Cascadia Code","Consolas",monospace;
}

/* ════ RESET ════════════════════════════════ */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{height:100%;-webkit-tap-highlight-color:transparent}
body{
  height:100%;background:var(--bg);color:var(--text);
  font-family:var(--font);font-size:14px;line-height:1.5;
  transition:background .25s,color .25s;
}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
button,input,select,textarea{font-family:var(--font)}

/* ════ ANIMATIONS ═══════════════════════════ */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade-up{animation:fadeUp .25s ease forwards}

/* ════ LAYOUT ═══════════════════════════════ */
#app{display:flex;height:100dvh;overflow:hidden}
#main{flex:1;overflow-y:auto;min-width:0;background:var(--bg)}
#content{padding:22px 24px;animation:fadeUp .22s ease}

/* ── Sidebar (desktop) ── */
#sidebar{
  width:252px;flex-shrink:0;display:flex;flex-direction:column;
  background:var(--glass);-webkit-backdrop-filter:blur(20px) saturate(160%);
  backdrop-filter:blur(20px) saturate(160%);
  border-right:1px solid var(--border);
  transition:width .22s ease,transform .22s ease;
  z-index:30;overflow:hidden;
}
#sidebar.collapsed{width:62px}
.sb-header{
  height:54px;padding:0 14px;flex-shrink:0;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid var(--border);overflow:hidden;
}
.sb-logo{font-size:22px;flex-shrink:0;line-height:1}
.sb-brand{
  font-weight:700;font-size:15px;color:var(--acc);
  white-space:nowrap;flex:1;overflow:hidden;
}
.collapsed .sb-brand{display:none}
.sb-toggle{
  flex-shrink:0;background:none;border:none;color:var(--muted);
  cursor:pointer;width:30px;height:30px;border-radius:var(--rx);
  display:flex;align-items:center;justify-content:center;font-size:16px;
  transition:background .15s,color .15s;
}
.sb-toggle:hover{background:var(--card2);color:var(--text)}

/* user bar */
.user-bar{
  padding:10px 12px;border-bottom:1px solid var(--border);
  cursor:pointer;display:flex;align-items:center;gap:9px;
  position:relative;transition:background .15s;flex-shrink:0;
}
.user-bar:hover{background:var(--card2)}
.user-av{
  width:34px;height:34px;border-radius:50%;
  background:linear-gradient(135deg,var(--acc),var(--acc2));
  display:flex;align-items:center;justify-content:center;
  font-size:18px;flex-shrink:0;line-height:1;
}
.user-info{flex:1;min-width:0;overflow:hidden}
.user-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:10px;color:var(--muted2)}
.collapsed .user-info{display:none}

/* member dropdown */
.member-dd{
  position:absolute;top:calc(100% + 4px);left:6px;right:6px;
  background:var(--card3);-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px);
  border:1px solid var(--border2);border-radius:var(--rs);
  z-index:200;overflow:hidden;box-shadow:var(--sh);
  animation:fadeIn .15s ease;
}
.member-opt{
  padding:10px 13px;display:flex;align-items:center;gap:9px;
  cursor:pointer;font-size:13px;transition:background .1s;
}
.member-opt:hover{background:var(--card2)}
.member-opt.danger{color:var(--red);border-top:1px solid var(--border)}

/* nav */
#nav{flex:1;overflow-y:auto;padding:5px 0}
.nav-item{
  display:flex;align-items:center;gap:10px;padding:8px 13px;
  cursor:pointer;border-left:3px solid transparent;transition:all .14s;
  min-height:40px;
}
.collapsed .nav-item{justify-content:center;padding:10px 0;border-left:none}
.nav-item:hover{background:var(--card2)}
.nav-item.active{background:color-mix(in srgb,var(--acc) 12%,transparent);border-left-color:var(--acc)}
.nav-item.active .nav-lbl{color:var(--acc);font-weight:600}
.nav-icon{font-size:15px;flex-shrink:0;line-height:1}
.nav-lbl{font-size:13px;color:var(--muted);white-space:nowrap}
.collapsed .nav-lbl{display:none}

.sync-bar{
  padding:8px 12px;border-top:1px solid var(--border);
  font-size:10px;color:var(--muted2);
  display:flex;align-items:center;gap:6px;overflow:hidden;flex-shrink:0;
}
.collapsed .sync-bar-txt{display:none}

/* ── Mobile header ── */
#mob-header{
  display:none;position:fixed;top:0;left:0;right:0;height:52px;
  background:var(--glass);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);
  padding:0 14px;z-index:50;align-items:center;gap:10px;
}
.mh-btn{
  background:none;border:none;color:var(--text);cursor:pointer;
  font-size:20px;width:36px;height:36px;border-radius:var(--rx);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.mh-btn:hover{background:var(--card2)}
.mh-title{font-weight:600;font-size:15px;flex:1}

/* ── Sidebar backdrop (mobile) ── */
#sb-backdrop{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.5);-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px);
  z-index:29;
}
#sb-backdrop.show{display:block}

/* ── Mobile bottom nav ── */
#mob-nav{display:none}

/* ════ RESPONSIVE ═══════════════════════════ */
/* Tablet: auto-collapse sidebar */
@media(max-width:1024px) and (min-width:769px){
  #sidebar{width:62px}
  .sb-brand,.nav-lbl,.user-info,.sync-bar-txt{display:none!important}
  .nav-item{justify-content:center;padding:10px 0;border-left:none}
  #content{padding:18px 20px}
}

/* Mobile */
@media(max-width:768px){
  #sidebar{
    position:fixed;inset:0 auto 0 0;
    width:78vw;max-width:270px;
    transform:translateX(-100%);
    z-index:30;
    box-shadow:var(--sh);
    transition:transform .25s ease;
  }
  #sidebar.mob-open{transform:translateX(0)}
  #mob-header{display:flex}
  #main{padding-top:52px;padding-bottom:60px}
  #content{padding:14px 14px}
  #mob-nav{
    display:flex;
    position:fixed;bottom:0;left:0;right:0;
    background:var(--glass);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);
    border-top:1px solid var(--border);z-index:50;
    padding:4px 0 max(4px,env(safe-area-inset-bottom));
  }
  .mnav-item{
    flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:2px;padding:5px 2px;cursor:pointer;
    border:none;background:none;color:var(--muted);
    font-size:9px;touch-action:manipulation;
  }
  .mnav-item.active{color:var(--acc)}
  .mnav-icon{font-size:20px;line-height:1.2}
  .mnav-lbl{font-size:9px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:56px;font-weight:500}
  .grid2,.grid3,.grid4{grid-template-columns:1fr!important}
  .stat-grid{grid-template-columns:repeat(2,1fr)}
}

/* ════ CARDS ════════════════════════════════ */
.card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:16px;transition:border-color .2s;
}
.card.click{cursor:pointer}
.card.click:hover{border-color:var(--border2);transform:translateY(-1px)}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.stat-card{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--rs);padding:13px;
  display:flex;align-items:flex-start;gap:11px;
}
.stat-icon{border-radius:var(--rx);padding:8px;font-size:18px;flex-shrink:0;line-height:1}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:1px}
.stat-value{font-size:20px;font-weight:700;line-height:1.2}
.stat-sub{font-size:11px;color:var(--muted2);margin-top:2px}

/* ════ FORMS ════════════════════════════════ */
.form-group{display:flex;flex-direction:column;gap:5px}
label.fl{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.req{color:var(--pink)}

input[type=text],input[type=number],input[type=date],input[type=time],
input[type=password],input[type=email],input[type=url],
select,textarea{
  background:var(--card2);border:1px solid var(--border);
  border-radius:var(--rx);padding:9px 12px;
  color:var(--text);font-size:13px;outline:none;
  transition:border-color .2s,box-shadow .2s;width:100%;
  -webkit-appearance:none;appearance:none;
}
input:focus,select:focus,textarea:focus{
  border-color:var(--acc);
  box-shadow:0 0 0 3px color-mix(in srgb,var(--acc) 22%,transparent);
}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator{filter:invert(.5) brightness(1.2)}
select option{background:var(--bg2);color:var(--text)}
textarea{resize:vertical;min-height:68px}

.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media(max-width:600px){.grid2,.grid3,.grid4{grid-template-columns:1fr}}
@media(min-width:601px) and (max-width:900px){.grid3,.grid4{grid-template-columns:1fr 1fr}}

.checkbox-row{
  display:flex;align-items:center;gap:8px;
  padding:6px 0;font-size:13px;cursor:pointer;min-height:36px;
}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--acc);cursor:pointer;flex-shrink:0}
input[type=range]{width:100%;accent-color:var(--acc);cursor:pointer}

/* ════ BUTTONS ══════════════════════════════ */
.btn{
  display:inline-flex;align-items:center;justify-content:center;gap:6px;
  border:none;border-radius:var(--rx);font-weight:600;font-size:13px;
  cursor:pointer;transition:all .16s;white-space:nowrap;
  padding:9px 16px;line-height:1;min-height:38px;
  touch-action:manipulation;-webkit-user-select:none;user-select:none;
}
.btn-sm{font-size:12px;padding:5px 11px;min-height:30px}
.btn-lg{font-size:15px;padding:13px 24px;min-height:48px}
.btn-full{width:100%;justify-content:center}
.btn-primary{background:var(--acc);color:var(--bg);font-weight:700}
.btn-primary:hover{filter:brightness(1.08)}
.btn-primary:active{transform:scale(.96)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--acc)}
.btn-danger{
  background:color-mix(in srgb,var(--red) 14%,transparent);
  color:var(--red);border:1px solid color-mix(in srgb,var(--red) 28%,transparent);
}
.btn-danger:hover{background:color-mix(in srgb,var(--red) 24%,transparent)}
.btn-ghost{background:transparent;color:var(--muted);border:none;padding:5px 8px;min-height:30px}
.btn-ghost:hover{color:var(--text);background:var(--card2)}
.btn:disabled{opacity:.4;cursor:not-allowed;pointer-events:none}

/* ════ TAGS ═════════════════════════════════ */
.tag{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
.badge-row{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:5px}
.admin-badge{font-size:10px;background:color-mix(in srgb,var(--yellow) 18%,transparent);color:var(--yellow);padding:2px 7px;border-radius:20px;font-weight:600}

/* ════ MODAL ════════════════════════════════ */
#modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.72);
  -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);
  z-index:500;display:none;
  align-items:flex-end;justify-content:center;
  opacity:0;transition:opacity .2s;padding:0;
}
@media(min-width:600px){#modal-overlay{align-items:center;padding:16px}}
#modal-overlay.vis{display:flex}
#modal-overlay.show{opacity:1}
.modal-box{
  background:var(--card3);
  -webkit-backdrop-filter:blur(24px) saturate(160%);
  backdrop-filter:blur(24px) saturate(160%);
  border:1px solid var(--border2);
  border-radius:var(--r) var(--r) 0 0;
  padding:20px;width:100%;max-height:93dvh;overflow-y:auto;
  transform:translateY(30px);transition:transform .25s cubic-bezier(.4,0,.2,1);
  box-shadow:var(--sh);
}
@media(min-width:600px){
  .modal-box{border-radius:var(--r);max-width:520px;transform:scale(.96)}
  .modal-box.wide{max-width:760px}
  .modal-box.xl{max-width:920px}
}
#modal-overlay.show .modal-box{transform:translateY(0)}
@media(min-width:600px){#modal-overlay.show .modal-box{transform:scale(1)}}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.mt{font-weight:700;font-size:16px}
.mc{
  background:var(--card2);border:none;color:var(--muted);
  font-size:20px;cursor:pointer;padding:4px 8px;
  border-radius:var(--rx);transition:background .15s;line-height:1;
}
.mc:hover{background:var(--card3);color:var(--text)}
.mf{display:flex;gap:8px;justify-content:flex-end;margin-top:16px;padding-top:14px;border-top:1px solid var(--border);flex-wrap:wrap}
.fs{display:flex;flex-direction:column;gap:13px}

/* ════ LIST ITEMS ═══════════════════════════ */
.data-list{display:flex;flex-direction:column;gap:8px}
.list-item{
  background:var(--card);border:1px solid var(--border);
  border-radius:var(--rs);padding:13px;
  display:flex;align-items:flex-start;gap:11px;
  transition:border-color .14s;
}
.list-item:hover{border-color:var(--border2)}
.list-body{flex:1;min-width:0}
.list-actions{display:flex;gap:3px;flex-shrink:0;margin-left:4px;flex-wrap:wrap}
.list-primary{font-weight:600;font-size:14px;margin-bottom:3px}
.list-secondary{font-size:12px;color:var(--muted2);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.list-meta{font-size:12px;color:var(--muted);margin-top:4px}

.sb-search{position:relative;margin-bottom:14px;max-width:300px}
.sb-search input{padding-left:32px}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:13px;pointer-events:none}

.empty{text-align:center;padding:40px 20px;color:var(--muted2)}
.empty-icon{font-size:40px;margin-bottom:10px;opacity:.4}

.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px}
.st{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}

/* ════ TABS ═════════════════════════════════ */
.tab-bar{
  display:flex;gap:3px;background:var(--card2);
  border-radius:var(--rs);padding:4px;
  margin-bottom:18px;flex-wrap:wrap;
}
.tab-btn{
  flex:1;min-width:fit-content;padding:7px 10px;
  border:none;border-radius:var(--rx);

function applyTheme(t, m) {
  const el = document.documentElement;

    ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
    : m;
  el.setAttribute('data-t', t || 'ios');
  el.setAttribute('data-m', mode || 'dark');
  localStorage.setItem('fh-theme', JSON.stringify({t, m}));
}

function loadTheme() {

}

const bmiColor = v => ({Kurus:'var(--acc2)',Normal:'var(--green)',Gemuk:'var(--orange)',Obesitas:'var(--red)'})[bmiLabel(v)]||'var(--muted)';

function predictMen(records) {
  const m = (records||[]).filter(r=>r.type==='menstruasi').sort((a,b)=>new Date(b.startDate)-new Date(a.startDate));
  if(m.length<2) return null;
  const avg = m.slice(0,4).reduce((s,r)=>s+(parseFloat(r.cycle)||28),0)/Math.min(4,m.length);
  const ns = new Date(m[0].startDate); ns.setDate(ns.getDate()+Math.round(avg));
  const ov = new Date(ns); ov.setDate(ov.getDate()-14);
  const f1 = new Date(ov); f1.setDate(f1.getDate()-3);
  const f2 = new Date(ov); f2.setDate(f2.getDate()+3);
  return {
    nextStart:ns.toISOString().split('T')[0],
    ovulation:ov.toISOString().split('T')[0],
    fertileStart:f1.toISOString().split('T')[0],
    fertileEnd:f2.toISOString().split('T')[0],
    avgCycle:Math.round(avg)
  };
}

async function syncToSheet(silent) {
  if(!S.sheetUrl) return;
  if(!silent){ S.syncStatus='🔄 Menyinkronkan...'; renderSyncBar(); }
  try {
    await fetch(S.sheetUrl,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({action:'saveData',familyData:S.familyData,healthData:S.healthData,savedAt:new Date().toISOString()}),mode:'no-cors'});
  } catch(e){}
  S.syncStatus='✅ '+new Date().toLocaleTimeString('id-ID');
  renderSyncBar();
}

async function syncFromSheet() {
  if(!S.sheetUrl) return false;
  S.syncStatus='🔄 Memuat...'; renderSyncBar();
  try {
    const r=await fetch(S.sheetUrl+(S.sheetUrl.includes('?')?'&':'?')+'action=getData',{mode:'cors'});

function buildLoginStep() {
  const step = S.loginStep;
  const ms = S.familyData.members;
  const sel = S.loginMemberId;
  const selM = sel ? ms.find(x => x.id === sel) : null;

  const dots = [1,2,3].map(i =>
    `<div class="step-dot ${i < step ? 'done' : i === step ? 'active' : ''}"></div>`
  ).join('');

  let body = '';

  if (step === 1) {
    body = `
      <div class="slabel">Langkah 1 dari 3 — Koneksi Data</div>
      <div class="fs">
        <div class="form-group">
          <label class="fl">URL Apps Script <span class="req">*</span></label>
          <input id="inp-sheet" type="url" value="${esc(S.loginSheetUrl)}"
            placeholder="https://script.google.com/macros/s/..."
            style="font-size:12px" autocomplete="off">
          <div style="font-size:11px;color:var(--muted2);margin-top:5px;line-height:1.6">
            Tempel URL dari Google Apps Script Web App.<br>
            <span style="color:var(--acc)">💡 Panduan ada di Pengaturan → Panduan Setup</span>
          </div>
        </div>
        <button id="btn-s1" class="btn btn-primary btn-full btn-lg">Lanjutkan →</button>
        <div id="err1" class="err-msg">${esc(S.loginError)}</div>
        <div id="sync-s1" style="font-size:12px;color:var(--muted2);text-align:center;min-height:16px"></div>
      </div>`;
  } else if (step === 2) {
    body = `
      <div class="slabel">Langkah 2 dari 3 — Pilih Profil</div>
      <div class="mg">
        ${ms.map(m => `
          <div class="mc2 ${sel === m.id ? 'sel' : ''}" onclick="loginSelMember(${m.id})">
            <div class="mc2-av">${m.avatar}</div>
            <div class="mc2-name">${esc(m.name)}</div>
            <div class="mc2-role">${esc(m.role)}</div>
            ${m.isAdmin ? `<div style="margin-top:4px">${tag('Admin','var(--yellow)')}</div>` : ''}
          </div>`).join('')}
      </div>
      <button id="btn-s2" class="btn btn-primary btn-full" ${sel ? '' : 'disabled'}>Lanjutkan →</button>
      <button class="btn btn-ghost btn-sm btn-full" style="margin-top:8px"
        onclick="loginGoStep(1)">← Kembali</button>`;
  } else {
    body = `
      <div class="slabel">Langkah 3 dari 3 — PIN</div>
      ${selM ? `
        <div style="text-align:center;margin-bottom:16px">
          <div style="font-size:36px;line-height:1.2">${selM.avatar}</div>
          <div style="font-weight:700;font-size:16px;margin-top:6px">${esc(selM.name)}</div>
          ${selM.isAdmin ? `<div style="margin-top:5px">${tag('Admin','var(--yellow)')}</div>` : ''}
        </div>` : ''}
      <div class="form-group">
        <label class="fl" style="text-align:center;display:block;margin-bottom:6px">Masukkan PIN</label>
        <div class="pin-visual" id="pin-visual">
          <div class="pin-cell" id="pc0"></div>
          <div class="pin-cell" id="pc1"></div>
          <div class="pin-cell" id="pc2"></div>
          <div class="pin-cell" id="pc3"></div>
          <input class="pin-real" id="pin-real" type="tel" maxlength="6"
            inputmode="numeric" pattern="[0-9]*" autocomplete="off" autocorrect="off"
            autocapitalize="none" spellcheck="false">
        </div>
      </div>
      <button id="btn-login" class="btn btn-primary btn-full btn-lg" style="margin-top:8px">
        Masuk 🚀
      </button>
      <div id="err3" class="err-msg">${esc(S.loginError)}</div>
      <button class="btn btn-ghost btn-sm btn-full" style="margin-top:8px"
        onclick="loginGoStep(2)">← Kembali</button>

  }

  return `
    <div id="login-screen">

function bindLoginStep() {
  const step = S.loginStep;

  if (step === 1) {
    const inp = document.getElementById('inp-sheet');
    const btn = document.getElementById('btn-s1');
    const go = async () => {
      const url = inp?.value.trim();
      S.loginSheetUrl = url;
      if (!url) { S.loginError = 'URL wajib diisi'; renderLogin(); return; }
      S.loginError = '';
      S.sheetUrl = url;
      const el = document.getElementById('sync-s1');
      if (el) el.textContent = '🔄 Menghubungkan…';
      if (btn) btn.disabled = true;
      await syncFromSheet();
      S.loginStep = 2;
      renderLogin();
    };
    if (btn) btn.onclick = go;
    if (inp) { inp.onkeydown = e => e.key === 'Enter' && go(); inp.focus(); }
  }

  if (step === 2) {
    const btn = document.getElementById('btn-s2');
    if (btn) btn.onclick = () => { if (S.loginMemberId) loginGoStep(3); };
  }

  if (step === 3) {
    const real = document.getElementById('pin-real');
    const btn  = document.getElementById('btn-login');

    const updateCells = () => {
      const v = real?.value || '';
      for (let i = 0; i < 4; i++) {
        const cell = document.getElementById('pc' + i);
        if (!cell) continue;
        cell.classList.toggle('filled', i < v.length);
        cell.classList.toggle('focused', i === Math.min(v.length, 3));
      }
    };

    const doLogin = () => {
      const pin = real?.value;
      const m = S.familyData.members.find(x => x.id === S.loginMemberId);
      if (!m) return;
      if (m.pin === pin) {
        S.user = m; S.screen = 'app'; S.module = 'dashboard'; S.loginError = '';
        renderApp();
      } else {
        S.loginError = 'PIN salah ❌';
        if (real) real.value = '';
        updateCells();
        const e = document.getElementById('err3');
        if (e) { e.textContent = 'PIN salah ❌'; }
        if (real) real.focus();
      }
    };

    if (real) {
      real.oninput = () => { updateCells(); if (real.value.length >= 4) doLogin(); };
      real.onkeydown = e => e.key === 'Enter' && doLogin();
      // Click anywhere on pin-visual to focus
      document.getElementById('pin-visual')?.addEventListener('click', () => real.focus());
      // Focus immediately — single focused input, no competition
      setTimeout(() => { if (real) real.focus(); }, 60);
    }
    if (btn) btn.onclick = doLogin;
    updateCells();
  }
}

function loginGoStep(n) {
  S.loginStep = n;
  S.loginError = '';
  renderLogin();
}

function attachShellEvents() {
  document.getElementById('sb-toggle')?.addEventListener('click', e => {
    e.stopPropagation();
    S.sidebarCollapsed = !S.sidebarCollapsed;
    renderApp();
  });
  document.getElementById('user-bar')?.addEventListener('click', e => {
    e.stopPropagation();
    S.memberDropdown = !S.memberDropdown;
    renderApp();
  });
  document.getElementById('sb-backdrop')?.addEventListener('click', () => {
    S._mobSidebar = false;
    document.getElementById('sidebar')?.classList.remove('mob-open');
    document.getElementById('sb-backdrop')?.classList.remove('show');
  });
  // Close dropdown on outside click
  const closeDD = () => { if (S.memberDropdown) { S.memberDropdown = false; renderApp(); } };
  setTimeout(() => document.addEventListener('click', closeDD, {once:true}), 10);
}

function toggleMobSidebar() {
  S._mobSidebar = !S._mobSidebar;
  document.getElementById('sidebar')?.classList.toggle('mob-open', S._mobSidebar);
  document.getElementById('sb-backdrop')?.classList.toggle('show', S._mobSidebar);

function openModal(title, body, buttons, wide) {

function renderList(module, items, renderItemFn, title, icon, sortFn, extraButtons) {
  const sorted = sortFn ? [...items].sort(sortFn) : [...items].reverse();
  return '<div class="sh"><div class="st">'+icon+' '+title+'</div><div style="display:flex;gap:8px;align-items:center">'+(extraButtons||'')+'<button class="btn btn-primary btn-sm" onclick="openAdd(\''+module+'\')">+ Tambah</button></div></div>'
  +'<div class="sb-search"><span class="si">🔍</span><input type="text" placeholder="Cari..." oninput="filterList(\'list-'+module+'\',this.value)"></div>'
  +'<div class="data-list" id="list-'+module+'">'
  +(sorted.length===0?'<div class="empty"><div class="empty-icon">'+icon+'</div><div class="empty-text">Belum ada data '+title+'</div></div>'
  :sorted.map(item=>'<div class="list-item" id="li-'+item.id+'">'
    +'<div class="list-body">'+renderItemFn(item)+'</div>'
    +'<div class="list-actions">'
    +(item._shareable?'<button class="btn btn-ghost btn-sm" title="Bagikan" onclick="shareItem(\''+module+'\',\''+item.id+'\')">↗</button>':'')
    +'<button class="btn btn-ghost btn-sm" title="Duplikat" onclick="dupItem(\''+module+'\',\''+item.id+'\')">⧉</button>'
    +'<button class="btn btn-ghost btn-sm" title="Edit" onclick="openEdit(\''+module+'\',\''+item.id+'\')">✏️</button>'
    +'<button class="btn btn-danger btn-sm" title="Hapus" onclick="delItem(\''+module+'\',\''+item.id+'\')">🗑</button>'
    +'</div></div>').join(''))
  +'</div>';
}

function filterList(id, q) {
  document.getElementById(id)?.querySelectorAll('.list-item').forEach(el=>{
    el.style.display=el.textContent.toLowerCase().includes(q.toLowerCase())?'':'none';
  });
}

function delItem(mod, id) {
  if(!confirm('Hapus data ini?')) return;
  const h=getH(); setH(mod, (h[mod]||[]).filter(x=>x.id!==id));
  document.getElementById('li-'+id)?.remove();
  toast('Dihapus','');
}

function dupItem(mod, id) {
  const h=getH(); const item=(h[mod]||[]).find(x=>x.id===id); if(!item) return;
  const copy={...item, id:uid(), _duped:true};
  if(copy.date===today()) copy.date=today();
  setH(mod, [...(h[mod]||[]), copy]);
  toast('Data diduplikat ✓','success');
  setTimeout(()=>renderModule(),120);
}

function shareItem(mod, id) {
  const h=getH(); const item=(h[mod]||[]).find(x=>x.id===id); if(!item) return;
  let txt='';
  if(mod==='exercise') txt='🏃 Aktivitas '+esc(item.type||'')+' saya!\n📅 '+fmt(item.date)+'\n⏱️ '+(item.duration||'?')+' '+(item.durationUnit||'menit')+(item.distance?'\n📏 '+item.distance+' km':'')+(item.calories?'\n🔥 '+item.calories+' kkal':''+(item.reps?'\n🔁 '+item.reps+' repetisi':''))+(item.hr?'\n💓 HR: '+item.hr+' bpm':'')+'\n#HealthyLifestyle #FamilyHealth';
  else if(mod==='nutrition') txt='🥗 Nutrisi hari ini!\n'+fmt(item.date)+'\n'+item.foods+(item.calories?'\n🔥 '+item.calories+' kkal':'')+(item.protein?'\n🥩 Protein '+item.protein+'g':'')+'\n#HealthyEating';
  else if(mod==='spo2') txt='💓 Status SpO2: '+item.value+'% | HR: '+(item.hr||'?')+' bpm\n'+fmt(item.date)+' '+( item.time||'')+'\n#HealthMonitor';
  else if(mod==='sleep') txt='😴 Tidur '+( item.duration||'?')+'j — Kualitas: '+(item.quality||'-')+'\n'+fmt(item.date)+'\n#SleepWell';
  if(txt) navigator.clipboard?.writeText(txt).then(()=>toast('Caption disalin! 🎉','success')).catch(()=>{ prompt('Salin teks ini:',txt); });
}

// openAdd/openEdit: these call module-specific form builders
// stored in FORMS object below
const FORMS = {};

function openAdd(mod) {
  const cfg=FORMS[mod]; if(!cfg) return;
  S._currentModal=mod; S._editId=null; S._formExtra={};
  openModal('+ Tambah '+cfg.title, cfg.build({}), [{label:'Simpan',cls:'btn-primary',fn:'saveForm()'},{label:'Batal',cls:'btn-secondary',fn:'closeModal()'}], cfg.size||'');
  cfg.afterOpen&&cfg.afterOpen({});
}

function openEdit(mod, id) {
  const cfg=FORMS[mod]; if(!cfg) return;
  const h=getH(); const item=(h[mod]||[]).find(x=>x.id===id); if(!item) return;
  S._currentModal=mod; S._editId=id; S._formExtra={};
  openModal('✏️ Edit '+cfg.title, cfg.build(item), [{label:'Simpan Perubahan',cls:'btn-primary',fn:'saveForm()'},{label:'Batal',cls:'btn-secondary',fn:'closeModal()'}], cfg.size||'');
  cfg.afterOpen&&cfg.afterOpen(item);
}

function saveForm() {
  const mod=S._currentModal; const cfg=FORMS[mod]; if(!cfg) return;
  const data=cfg.collect ? cfg.collect() : collectForm();
  if(!data) return;
  const h=getH();
  if(S._editId) setH(mod, (h[mod]||[]).map(x=>x.id===S._editId?{...x,...data}:x));
  else setH(mod, [...(h[mod]||[]), {...data, id:uid()}]);
  closeModal();
  toast('Disimpan ✓','success');
  setTimeout(()=>renderModule(),100);
}

function collectForm() {
  const box=document.getElementById('modal-box'); if(!box) return {};
  const data={};
  box.querySelectorAll('[name]').forEach(el=>{
    data[el.name]=el.type==='checkbox'?el.checked:el.value;
  });
  return data;
}

  return '<label class="checkbox-row"><input type="checkbox" name="'+name+'" '+(val||val==='true'?'checked':'')+'>'+label+'</label>';
}
function fRange(name,label,min,max,val) {
  const v=val||min||1;
  return '<div class="form-group"><label class="fl">'+label+': <strong id="rv-'+name+'">'+v+'</strong></label><input type="range" name="'+name+'" min="'+min+'" max="'+max+'" value="'+v+'" oninput="document.getElementById(\'rv-'+name+'\').textContent=this.value"></div>';
}

const CT = {grid:'rgba(255,255,255,0.06)',tick:{color:'#5A7A90',font:{size:10,family:'DM Sans'}},tt:{backgroundColor:'#0F1D30',borderColor:'#1F3348',borderWidth:1,bodyColor:'#E8F0F5',titleColor:'#8BA3B5',padding:10}};

function mkOpts(extra) {
  return Object.assign({responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#8BA3B5',font:{size:11,family:'DM Sans'}}},tooltip:CT.tt},scales:{x:{grid:{color:CT.grid},ticks:CT.tick},y:{grid:{color:CT.grid},ticks:CT.tick}}},extra||{});
}

function drawBar(id,labels,datasets) {
  const el=document.getElementById(id); if(!el) return;
  if(S._charts[id]) S._charts[id].destroy();
  const COLS=['rgba(0,212,170,.8)','rgba(14,165,233,.8)','rgba(167,139,250,.8)','rgba(251,146,60,.8)'];
  S._charts[id]=new Chart(el,{type:'bar',data:{labels,datasets:datasets.map((d,i)=>({...d,backgroundColor:d.color||COLS[i%4],borderRadius:4,borderSkipped:false}))},options:mkOpts()});
}

function drawLine(id,labels,datasets,yMin,yMax) {
  const el=document.getElementById(id); if(!el) return;
  if(S._charts[id]) S._charts[id].destroy();
  const COLS=['var(--acc)','var(--red)','var(--purple)','var(--orange)'];
  const opts=mkOpts();
  if(yMin!==undefined) opts.scales.y.min=yMin;
  if(yMax!==undefined) opts.scales.y.max=yMax;
  S._charts[id]=new Chart(el,{type:'line',data:{labels,datasets:datasets.map((d,i)=>({...d,borderColor:d.color||COLS[i%4],backgroundColor:'transparent',fill:false,tension:.35,pointRadius:3,pointHoverRadius:5}))},options:opts});
}

function drawArea(id,labels,data,color) {
  const el=document.getElementById(id); if(!el) return;
  if(S._charts[id]) S._charts[id].destroy();
  const c=color||'var(--acc)';
  S._charts[id]=new Chart(el,{type:'line',data:{labels,datasets:[{label:'',data,borderColor:c,backgroundColor:c.replace('var(--','rgba(').replace(')',',0.15)').replace('--acc','0,212,170').replace('--purple','167,139,250'),fill:true,tension:.4,pointRadius:3}]},options:mkOpts()});
}

function drawPie(id,labels,data,size) {
  const el=document.getElementById(id); if(!el) return;
  if(S._charts[id]) S._charts[id].destroy();
  const cols=['rgba(0,212,170,.8)','rgba(14,165,233,.8)','rgba(244,114,182,.8)','rgba(251,146,60,.8)','rgba(167,139,250,.8)','rgba(251,191,36,.8)','rgba(74,222,128,.8)','rgba(248,113,113,.8)'];
  S._charts[id]=new Chart(el,{type:'doughnut',data:{labels,datasets:[{data,backgroundColor:cols,borderColor:'#0F1D30',borderWidth:2}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:size==='sm'?'bottom':'right',labels:{color:'#8BA3B5',font:{size:10},boxWidth:10,padding:6}},tooltip:CT.tt}}});
}

function lab() {
  const h=getH();
  const visits=[...h.labVisits].sort((a,b)=>new Date(b.date)-new Date(a.date));
  const allTests=visits.flatMap(v=>(v.tests||[]).map(t=>({...t,_visitId:v.id,_visitDate:v.date,_labName:v.labName})));
  // Category filter
  const activeCat=S.labTab;
  const catTests=allTests.filter(t=>t.category===activeCat);

  return '<div>'
  +'<div class="sh"><div class="st">🔬 Hasil Laboratorium</div><button class="btn btn-primary btn-sm" onclick="openLabVisitModal()">+ Tambah Kunjungan Lab</button></div>'
  +'<div class="tab-bar" style="flex-wrap:wrap;gap:4px;margin-bottom:16px">'
  +'<button class="tab-btn '+(S.labTab==='visits'?'active':'')+'" style="flex:none" onclick="S.labTab=\'visits\';renderModule()">📋 Kunjungan Lab</button>'

  +'</div>'
  +(S.labTab==='visits'?labVisitsList(visits):labCategoryView(activeCat,catTests))

    +'<div class="list-body">'
    +'<div class="badge-row">'+tag(fmt(v.date),'var(--acc2)')+(v.labName?tag(v.labName,'var(--muted)'):'')+'</div>'

    +'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-top:6px">'

function buildLabTests(tests) {
  return '<div id="lab-tests-list">'+tests.map((t,i)=>'<div class="card" style="margin-bottom:8px;padding:12px" id="lt-'+i+'">'
    +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><div style="font-weight:600;font-size:13px">Tes #'+(i+1)+'</div><button class="btn btn-danger btn-sm" type="button" onclick="removeLabTest('+i+')">🗑</button></div>'
    +'<div class="grid2" style="margin-bottom:8px">'
    +'<div class="form-group"><label class="fl">Nama Tes</label><input type="text" class="lt-name" value="'+esc(t.name)+'" placeholder="Hemoglobin, Glukosa..."><div id="lt-sugg-'+i+'" style="display:flex;flex-wrap:wrap;gap:4px;margin-top:4px"></div></div>'
    +'<div class="form-group"><label class="fl">Kategori</label><select class="lt-cat">'+Object.keys(LAB_CATEGORIES).map(c=>'<option value="'+esc(c)+'" '+(t.category===c?'selected':'')+'>'+esc(c)+'</option>').join('')+'</select></div>'
    +'</div>'
    +'<div class="grid4"><div class="form-group"><label class="fl">Nilai</label><input type="text" class="lt-val" value="'+esc(t.value)+'" placeholder="7.5"></div>'
    +'<div class="form-group"><label class="fl">Satuan</label><input type="text" class="lt-unit" value="'+esc(t.unit||'')+'" placeholder="g/dL"></div>'
    +'<div class="form-group"><label class="fl">Rentang Normal</label><input type="text" class="lt-range" value="'+esc(t.normalRange||'')+'" placeholder="12-16"></div>'
    +'<div class="form-group"><label class="fl">Status</label><select class="lt-status">'
    +['normal','tinggi','rendah','kritis'].map(s=>'<option '+(t.status===s?'selected':'')+'>'+s+'</option>').join('')
    +'</select></div></div>'
    +'<div class="form-group" style="margin-top:8px"><label class="fl">Catatan</label><input type="text" class="lt-notes" value="'+esc(t.notes||'')+'" placeholder=""></div>'
    +'</div>').join('')+'</div>';
}

function addLabTest() {
  const wrap=document.getElementById('lab-tests-wrap'); if(!wrap) return;
  const list=document.getElementById('lab-tests-list'); if(!list) return;
  const count=list.children.length;
  const div=document.createElement('div');
  div.innerHTML=buildLabTests([{name:'',category:'Fungsi Darah',value:'',unit:'',normalRange:'',status:'normal',notes:''}]);
  const newCard=div.firstElementChild.firstElementChild;
  newCard.id='lt-'+count;
  newCard.querySelector('.lt-name')&&(newCard.querySelectorAll('.lt-name')[0].placeholder='Nama tes...');
  list.appendChild(newCard);
}

function removeLabTest(i) {
  document.getElementById('lt-'+i)?.remove();
}

function collectLabTests() {
  const list=document.getElementById('lab-tests-list'); if(!list) return [];
  return [...list.querySelectorAll('.card')].map(card=>({
    name: card.querySelector('.lt-name')?.value||'',
    category: card.querySelector('.lt-cat')?.value||'Fungsi Darah',
    value: card.querySelector('.lt-val')?.value||'',
    unit: card.querySelector('.lt-unit')?.value||'',
    normalRange: card.querySelector('.lt-range')?.value||'',
    status: card.querySelector('.lt-status')?.value||'normal',
    notes: card.querySelector('.lt-notes')?.value||'',
  })).filter(t=>t.name&&t.value);
}

function saveLabVisit(editId) {
  const date=document.querySelector('[name=lv-date]')?.value||document.getElementById('modal-box')?.querySelector('input[name="lv-date"]')?.value;
  const labName=document.getElementById('modal-box')?.querySelector('input[name="lv-labname"]')?.value||'';
  const title=document.getElementById('modal-box')?.querySelector('input[name="lv-title"]')?.value||'';
  const notes=document.getElementById('modal-box')?.querySelector('textarea[name="lv-notes"]')?.value||'';
  
  // More robust field collection
  const box=document.getElementById('modal-box');
  const inputs=box?.querySelectorAll('input,textarea');
  const vals={};
  inputs&&inputs.forEach(el=>{ if(el.name) vals[el.name]=el.value; });
  
  const tests=collectLabTests();
  if(!vals['lv-date']&&!date){toast('Tanggal wajib diisi','error');return;}
  if(!tests.length){toast('Tambahkan minimal 1 tes lab','error');return;}
  
  const visit={
    id: editId||uid(),
    date: vals['lv-date']||date||today(),
    labName: vals['lv-labname']||labName,
    title: vals['lv-title']||title||'Kunjungan Lab',
    notes: vals['lv-notes']||notes,
    tests: tests,
  };
  const h=getH();
  if(editId) setH('labVisits',h.labVisits.map(v=>v.id===editId?visit:v));
  else setH('labVisits',[...h.labVisits,visit]);
  closeModal(); toast('Kunjungan Lab disimpan ✓','success');
  setTimeout(()=>renderModule(),100);
}

function editLabVisit(id) { openLabVisitModal(id); }
function dupLabVisit(id) {
  const h=getH(); const v=h.labVisits.find(x=>x.id===id); if(!v) return;
  setH('labVisits',[...h.labVisits,{...v,id:uid(),date:today()}]);
  toast('Duplikat berhasil','success'); setTimeout(()=>renderModule(),100);
}
function delLabVisit(id) {
  if(!confirm('Hapus kunjungan lab ini?')) return;
  const h=getH(); setH('labVisits',h.labVisits.filter(v=>v.id!==id));
  setTimeout(()=>renderModule(),100); toast('Dihapus','');
}

function exercise() {
  const h=getH();
  const thisWeek=h.exercise.filter(e=>(Date.now()-new Date(e.date).getTime())<7*86400000).reduce((s,e)=>s+(parseFloat(e.calories)||0),0);
  const types={};h.exercise.forEach(e=>{types[e.type]=(types[e.type]||0)+1;});
  const fav=Object.entries(types).sort((a,b)=>b[1]-a[1])[0]?.[0]||'-';
  const monthly={};h.exercise.forEach(e=>{const m=(e.date||'').substr(0,7);if(m){monthly[m]=(monthly[m]||0)+(parseFloat(e.calories)||0);}});
  const monthArr=Object.entries(monthly).sort().slice(-6);
  setTimeout(()=>{
    if(monthArr.length>1) drawBar('ch-exmonth',monthArr.map(x=>x[0]),[{label:'Kalori',data:monthArr.map(x=>x[1]),color:'rgba(0,212,170,.8)'}]);
  },60);
  return '<div>'
  +'<div class="stat-grid">'
  +statCard('🔥','Kalori Minggu Ini',thisWeek,'kkal','var(--orange)')
  +statCard('📅','Total Sesi',h.exercise.length,'','var(--acc)')
  +statCard('🏆','Favorit',fav,'','var(--purple)')
  +'</div>'
  +(monthArr.length>1?'<div class="card" style="margin-bottom:16px"><div class="card-title">📈 Kalori / Bulan</div><div class="chart-wrap"><canvas id="ch-exmonth"></canvas></div></div>':'')
  +renderList('exercise',h.exercise,item=>{
    item._shareable=true;
    return '<div class="badge-row">'+tag(item.type||'-','var(--acc)')+tag(fmt(item.date),'var(--muted2)')+'</div>'
    +'<div class="list-secondary" style="font-size:13px;gap:14px;margin-top:4px">'
    +(item.duration?'<span>⏱️ <b>'+item.duration+'</b> '+(item.durationUnit||'menit')+'</span>':'')
    +(item.reps?'<span>🔁 <b>'+esc(item.reps)+'</b></span>':'')
    +(item.distance?'<span>📏 <b>'+item.distance+'</b> km</span>':'')

  +'</div>';
}

  const sorted=[...h.spo2].sort((a,b)=>new Date(a.date+a.time)-new Date(b.date+b.time));

function requestNotifPermission() {
  if('Notification' in window && Notification.permission==='default') {
    Notification.requestPermission().then(p=>{ if(p==='granted') toast('Pengingat obat diaktifkan! ✓','success'); });
  }
}

function checkMedReminders() {
  if(!S.user||Notification.permission!=='granted') return;
  const h=getH(); const nowT=now_time();
  h.medications.filter(m=>(m.active||m.active==='true')&&(m.reminder||m.reminder==='true')).forEach(med=>{
    const sched=Array.isArray(med.schedule)?med.schedule:(med.schedule?med.schedule.split(','):[]);
    sched.forEach(t=>{
      if(t.trim()===nowT) {
        new Notification('⏰ Pengingat Obat',{body:'Saatnya minum '+med.name+' ('+med.dosage+')',icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💊</text></svg>'});
      }
    });
  });
}
setInterval(checkMedReminders, 60000);

function buildMedSchedule(active) {
  const now=now_time();
  const slots={};
  active.forEach(med=>{
    const sched=Array.isArray(med.schedule)?med.schedule:(med.schedule?med.schedule.split(',').map(s=>s.trim()).filter(Boolean):[]);
    if(!sched.length){
      if(!slots['(tidak ada jadwal spesifik)']) slots['(tidak ada jadwal spesifik)']=[];
      slots['(tidak ada jadwal spesifik)'].push(med);
    } else {
      sched.forEach(t=>{ if(!slots[t]) slots[t]=[]; slots[t].push(med); });
    }
  });
  const sortedSlots=Object.entries(slots).sort((a,b)=>a[0].localeCompare(b[0]));
  if(!sortedSlots.length) return '<div class="empty"><div class="empty-icon">💊</div><div class="empty-text">Tidak ada obat aktif dengan jadwal</div></div>';
  return '<div class="data-list">'+sortedSlots.map(([t,meds])=>{
    const isPast=t<now;
    return '<div class="list-item" style="'+(t===now?'border-color:var(--acc)':'')+'"><div class="list-body"><div style="font-size:16px;font-weight:700;font-family:var(--mono);color:'+(isPast?'var(--muted)':t===now?'var(--acc)':'var(--text)')+'">'+esc(t)+' '+(isPast?'✓':t===now?'← Sekarang!':'')+'</div><div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:8px">'+meds.map(m=>'<div style="background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:8px 12px"><div style="font-weight:600;font-size:14px">'+esc(m.name)+'</div><div style="font-size:12px;color:var(--muted2)">'+esc(m.dosage||'')+' '+(m.relation?'· '+esc(m.relation).replace(/_/g,' '):'')+'</div></div>').join('')+'</div></div></div>';
  }).join('')+'</div>';
}

function processImport(input, action) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const content=e.target.result;
    if(action==='importStrava'||action==='importGarmin'||action==='importMiFitness') parseActivityCSV(content);
    else if(action==='importAppleHealth') toast('Impor Apple Health XML membutuhkan parsing kompleks. Gunakan ekspor JSON dari FamilyHealth itu sendiri.','warn');
    else if(action==='importGoogleFit') parseActivityCSV(content);
    else toast('File diterima. Format ini membutuhkan pengembangan lebih lanjut.','');
  };
  reader.readAsText(file);
}

function parseActivityCSV(csv) {
  const lines=csv.split('\n').filter(l=>l.trim());
  if(lines.length<2){toast('File CSV kosong atau format tidak dikenali','error');return;}
  const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/['"]/g,''));
  const imported=[];
  lines.slice(1).forEach(line=>{
    const vals=line.split(',').map(v=>v.trim().replace(/['"]/g,''));
    const obj={id:uid()};
    headers.forEach((h,i)=>{ obj[h]=vals[i]||''; });
    // Normalize
    if(obj.date&&obj.type) imported.push({id:uid(),date:obj.date,type:obj.activitytype||obj.type||'Lainnya',duration:obj.duration||obj.movingtime||'',distance:obj.distance||'',calories:obj.calories||'',hr:obj.averageheartrate||obj.hr||'',notes:obj.notes||obj.name||''});
  });
  if(!imported.length){toast('Tidak ada data valid ditemukan di CSV','error');return;}
  const h=getH();
  setH('exercise',[...h.exercise,...imported]);
  toast(imported.length+' aktivitas berhasil diimpor! ✓','success');
}

function downloadExerciseTemplate() {
  const csv='date,type,duration,distance,calories,hr,notes\n2025-03-01,Lari,30,5.0,320,145,Pagi hari cerah\n2025-03-03,Bersepeda,45,12.0,400,130,';
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='exercise_template.csv';a.click();URL.revokeObjectURL(url);
}

function pickEmAv(el,av) {
  document.querySelectorAll('#em-av-picker button').forEach(b=>b.style.border='1px solid var(--border)');
  el.style.border='2px solid var(--acc)';
  document.getElementById('em-av').value=av;
}

function saveMemberEdit(id) {
  const qv=n=>(document.getElementById('modal-box')?.querySelector('[name="'+n+'"]')||document.getElementById(n))?.value||'';
  const name=qv('em-name').trim();
  const role=qv('em-role');
  const bdate=qv('em-bdate');
  const blood=qv('em-blood');
  const height=qv('em-height');
  const weight=qv('em-weight');
  const pin=qv('em-pin');
  const gender=qv('em-gender')||'male';
  const av=document.getElementById('em-av')?.value||'👤';
  const isAdmin=document.getElementById('em-admin')?.checked||false;
  if(!name){toast('Nama tidak boleh kosong','error');return;}
  S.familyData.members=S.familyData.members.map(m=>m.id===id?{...m,name,role,birthDate:bdate,bloodType:blood,height:parseFloat(height)||m.height,weight:parseFloat(weight)||m.weight,...(pin?{pin}:{}),gender,avatar:av,isAdmin}:m);
  if(S.user?.id===id) S.user=S.familyData.members.find(m=>m.id===id);
  autoSync(); closeModal(); toast('Profil disimpan ✓','success'); renderModule();
}

function deleteMember(id) {
  if(id===S.user?.id){toast('Tidak bisa menghapus akun yang sedang login','error');return;}
  const m=S.familyData.members.find(x=>x.id===id);
  if(!confirm('Hapus anggota '+m?.name+'? Semua data kesehatannya akan ikut terhapus.')) return;
  S.familyData.members=S.familyData.members.filter(x=>x.id!==id);
  delete S.healthData[id];
  autoSync(); toast('Anggota dihapus',''); renderModule();
}

function pickAv(el,av) {
  document.querySelectorAll('#av-picker button').forEach(b=>b.style.border='1px solid var(--border)');
  el.style.border='2px solid var(--acc)';
  document.getElementById('nm-av').value=av;
}

function addMember() {
  const name=document.getElementById('nm-name')?.value?.trim();
  const pin=document.getElementById('nm-pin')?.value;
  if(!name||!pin){toast('Nama dan PIN wajib diisi','error');return;}
  const id=Math.max(...S.familyData.members.map(m=>m.id))+1;
  const newM={id,name,role:document.getElementById('nm-role')?.value||'Anggota',pin,avatar:document.getElementById('nm-av')?.value||'👤',gender:document.getElementById('nm-gender')?.value||'male',birthDate:document.getElementById('nm-bdate')?.value||'',bloodType:document.getElementById('nm-blood')?.value||'',height:'',weight:'',isAdmin:document.getElementById('nm-admin')?.checked||false};
  S.familyData.members.push(newM);
  S.healthData[id]=mkHealth();
  autoSync(); toast('Anggota ditambahkan! ✓','success'); renderModule();
}

// ── EXPORT / IMPORT ──
function doExportJSON() {
  const data={version:VER,familyData:S.familyData,healthData:S.healthData,exportedAt:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='familyhealth_'+today()+'.json';a.click();URL.revokeObjectURL(url);
  toast('Diekspor! ✓','success');
}

function doExportCSV(memberId) {
  const m=S.familyData.members.find(x=>x.id===memberId);
  const h=S.healthData[memberId]||{};
  const rows=[['Modul','Tanggal','Data']];
  Object.entries(h).forEach(([mod,items])=>{ if(Array.isArray(items)) items.forEach(item=>rows.push([mod,item.date||item.startDate||'',JSON.stringify(item)])); });
  const csv=rows.map(r=>r.map(c=>'"'+String(c).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'});const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=(m?.name||'member')+'_'+today()+'.csv';a.click();URL.revokeObjectURL(url);
  toast('CSV diekspor ✓','success');
}

function doImportJSON(input) {
  const file=input.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const d=JSON.parse(ev.target.result);
      if(d.familyData&&d.healthData){ S.familyData=d.familyData; S.healthData=d.healthData; toast('Diimpor ✓','success'); renderModule(); }
      else toast('Format tidak valid','error');
    }catch{toast('File rusak','error');}
  };
  reader.readAsText(file);
}
