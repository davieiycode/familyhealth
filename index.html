<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FamilyHealth Monitor</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060C18;--bg2:#0B1525;--card:#0F1D30;--card2:#162438;--card3:#1C2E42;
  --border:#1F3348;--border2:#2A4460;
  --acc:#00D4AA;--acc2:#0EA5E9;--acc3:#6366F1;
  --pink:#F472B6;--orange:#FB923C;--yellow:#FBBF24;
  --red:#F87171;--green:#4ADE80;--purple:#A78BFA;
  --text:#E8F0F5;--muted:#8BA3B5;--muted2:#5A7A90;
  --font:'DM Sans',sans-serif;--mono:'DM Mono',monospace;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
button,input,select,textarea{font-family:var(--font)}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.fade-up{animation:fadeUp .3s ease forwards}
.fade-in{animation:fadeIn .2s ease forwards}
.spin{animation:spin 1s linear infinite}
.pulse{animation:pulse 2s ease infinite}
.mono{font-family:var(--mono)}

/* ── LAYOUT ── */
#app{display:flex;height:100vh;overflow:hidden}
#sidebar{width:248px;background:var(--card);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;transition:width .25s cubic-bezier(.4,0,.2,1);z-index:10}
#sidebar.collapsed{width:62px}
#main{flex:1;overflow-y:auto;min-width:0;background:var(--bg)}
.sidebar-header{padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10;min-height:60px}
.sidebar-logo{font-size:22px;flex-shrink:0}
.sidebar-title{font-weight:700;font-size:15px;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap;overflow:hidden}
.collapsed .sidebar-title,.collapsed .nav-label,.collapsed .user-info{display:none}
.sidebar-toggle{margin-left:auto;background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;flex-shrink:0;padding:4px;border-radius:6px;transition:color .2s}
.sidebar-toggle:hover{color:var(--text)}
.user-bar{padding:10px 12px;border-bottom:1px solid var(--border);cursor:pointer;display:flex;align-items:center;gap:9px;position:relative;transition:background .15s}
.user-bar:hover{background:rgba(255,255,255,.03)}
.user-avatar{width:32px;height:32px;background:rgba(0,212,170,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.user-info{flex:1;min-width:0}
.user-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.user-role{font-size:11px;color:var(--muted)}
.user-caret{font-size:10px;color:var(--muted);flex-shrink:0}
#nav{flex:1;overflow-y:auto;padding:6px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 14px;cursor:pointer;border-left:3px solid transparent;transition:all .15s;justify-content:flex-start}
.collapsed .nav-item{justify-content:center;padding:10px 0}
.nav-item:hover{background:rgba(255,255,255,.03)}
.nav-item.active{background:rgba(0,212,170,.08);border-left-color:var(--acc)}
.nav-item.active .nav-label{color:var(--acc);font-weight:600}
.nav-icon{font-size:16px;flex-shrink:0}
.nav-label{font-size:13px;color:var(--muted);white-space:nowrap}
.member-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--card2);border:1px solid var(--border);border-radius:8px;z-index:100;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.5)}
.member-opt{padding:9px 13px;display:flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;transition:background .1s}
.member-opt:hover{background:var(--border)}
.member-opt.danger{color:var(--red);border-top:1px solid var(--border)}
#content{padding:24px;animation:fadeUp .25s ease}

/* ── CARDS ── */
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;transition:border-color .2s}
.card.hoverable{cursor:pointer}
.card.hoverable:hover{border-color:var(--border2);transform:translateY(-1px)}
.card-title{font-size:14px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:flex-start;gap:12px}
.stat-icon{border-radius:9px;padding:9px;font-size:18px;flex-shrink:0}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:2px}
.stat-value{font-size:20px;font-weight:700;line-height:1.2}
.stat-sub{font-size:11px;color:var(--muted2);margin-top:2px}

/* ── FORMS ── */
.form-group{display:flex;flex-direction:column;gap:5px}
label.fl{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.3px}
.req{color:var(--pink)}
input[type=text],input[type=number],input[type=date],input[type=time],input[type=password],input[type=email],input[type=url],select,textarea{
  background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:9px 12px;
  color:var(--text);font-size:13px;outline:none;transition:border-color .2s;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
select option{background:var(--card2);color:var(--text)}
textarea{resize:vertical}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.checkbox-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;cursor:pointer}
input[type=checkbox]{width:16px;height:16px;accent-color:var(--acc);cursor:pointer}
.range-wrap{display:flex;flex-direction:column;gap:4px}
input[type=range]{width:100%;accent-color:var(--acc)}

/* ── BUTTONS ── */
.btn{display:inline-flex;align-items:center;gap:6px;border:none;border-radius:8px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap;font-size:13px;padding:8px 16px}
.btn-sm{font-size:12px;padding:6px 12px}
.btn-lg{font-size:15px;padding:12px 24px}
.btn-full{width:100%;justify-content:center}
.btn-primary{background:var(--acc);color:#06101A}
.btn-primary:hover{filter:brightness(1.1)}
.btn-secondary{background:var(--card2);color:var(--text);border:1px solid var(--border)}
.btn-secondary:hover{border-color:var(--acc)}
.btn-danger{background:rgba(248,113,113,.12);color:var(--red);border:1px solid rgba(248,113,113,.25)}
.btn-danger:hover{background:rgba(248,113,113,.2)}
.btn-ghost{background:transparent;color:var(--muted);border:none}
.btn-ghost:hover{color:var(--text);background:rgba(255,255,255,.05)}
.btn-blue{background:var(--acc2);color:#fff}
.btn-blue:hover{filter:brightness(1.1)}
.btn:disabled{opacity:.4;cursor:not-allowed}

/* ── TAGS ── */
.tag{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}

/* ── MODAL ── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(5px);z-index:500;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;transition:opacity .2s}
#modal-overlay.visible{opacity:1}
.modal-box{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;width:100%;max-width:520px;max-height:88vh;overflow-y:auto;transform:translateY(10px);transition:transform .2s;box-shadow:0 24px 60px rgba(0,0,0,.6)}
#modal-overlay.visible .modal-box{transform:translateY(0)}
.modal-box.wide{max-width:740px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.modal-title{font-weight:600;font-size:16px}
.modal-close{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;line-height:1;padding:2px 6px}
.modal-close:hover{color:var(--text)}
.modal-footer{display:flex;gap:8px;justify-content:flex-end;margin-top:18px;padding-top:16px;border-top:1px solid var(--border)}
.form-stack{display:flex;flex-direction:column;gap:14px}

/* ── TABLES & LISTS ── */
.data-list{display:flex;flex-direction:column;gap:8px}
.list-item{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;display:flex;align-items:flex-start;gap:12px;transition:border-color .15s}
.list-item:hover{border-color:var(--border2)}
.list-body{flex:1;min-width:0}
.list-actions{display:flex;gap:5px;flex-shrink:0;margin-left:10px}
.list-primary{font-weight:600;font-size:14px;margin-bottom:3px}
.list-secondary{font-size:12px;color:var(--muted2);display:flex;flex-wrap:wrap;gap:8px;align-items:center}
.list-meta{font-size:12px;color:var(--muted);margin-top:5px}

/* ── SEARCH ── */
.search-bar{position:relative;margin-bottom:16px;max-width:320px}
.search-bar input{padding-left:32px}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted2);font-size:14px}

/* ── EMPTY STATE ── */
.empty{text-align:center;padding:48px 24px;color:var(--muted2)}
.empty-icon{font-size:44px;margin-bottom:14px;opacity:.5}
.empty-text{font-size:14px}

/* ── SECTION HEADER ── */
.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.section-title{font-size:20px;font-weight:700;display:flex;align-items:center;gap:8px}

/* ── TABS ── */
.tab-bar{display:flex;gap:4px;background:var(--card2);border-radius:10px;padding:4px;margin-bottom:20px}
.tab-btn{flex:1;padding:7px 10px;border:none;border-radius:7px;font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;background:transparent;color:var(--muted)}
.tab-btn.active{background:var(--acc);color:#06101A}

/* ── BADGE ── */
.badge-row{display:flex;flex-wrap:wrap;gap:6px;margin-top:5px}

/* ── LOGIN ── */
#login-screen{min-height:100vh;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden}
#login-screen::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 80% 60% at 50% -10%,rgba(0,212,170,.07),transparent),radial-gradient(ellipse 60% 40% at 100% 80%,rgba(14,165,233,.05),transparent);pointer-events:none}
.login-box{width:100%;max-width:460px;position:relative;z-index:1}
.login-hero{text-align:center;margin-bottom:36px}
.login-logo{font-size:52px;margin-bottom:14px;display:block}
.login-brand{font-size:30px;font-weight:700;background:linear-gradient(135deg,var(--acc),var(--acc2));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.login-sub{color:var(--muted);font-size:14px;margin-top:6px}
.login-step{display:none}
.login-step.active{display:block;animation:fadeUp .3s ease}
.step-label{font-size:11px;font-weight:600;color:var(--muted2);letter-spacing:.8px;text-transform:uppercase;margin-bottom:16px}
.member-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px}
.member-card{padding:16px;border-radius:10px;cursor:pointer;text-align:center;border:2px solid var(--border);background:var(--card2);transition:all .2s}
.member-card:hover{border-color:var(--border2)}
.member-card.selected{border-color:var(--acc);background:rgba(0,212,170,.08)}
.member-card-av{font-size:30px;margin-bottom:4px}
.member-card-name{font-weight:600;font-size:13px}
.member-card-role{font-size:11px;color:var(--muted2)}
.pin-input{text-align:center;font-size:24px;letter-spacing:10px;padding:12px}
.login-hint{font-size:11px;color:var(--muted2);text-align:center;margin-top:10px}
.sheet-input-wrap{position:relative}
.sheet-input-wrap input{padding-right:36px}
.sheet-input-info{font-size:11px;color:var(--muted2);margin-top:6px;line-height:1.6}
.error-msg{color:var(--red);font-size:12px;text-align:center;margin-top:8px;min-height:16px}
.sync-status{font-size:12px;margin-top:8px;text-align:center;min-height:16px}

/* ── CHARTS ── */
.chart-wrap{position:relative;height:200px}
.chart-wrap.tall{height:260px}

/* ── NOTIFICATION ── */
#toast{position:fixed;bottom:24px;right:24px;background:var(--card2);border:1px solid var(--border);border-radius:10px;padding:12px 18px;font-size:13px;font-weight:500;z-index:999;transform:translateY(80px);opacity:0;transition:all .3s;max-width:300px;box-shadow:0 8px 24px rgba(0,0,0,.4)}
#toast.show{transform:translateY(0);opacity:1}
#toast.success{border-color:var(--green);color:var(--green)}
#toast.error{border-color:var(--red);color:var(--red)}

/* ── PREDICTION BOX ── */
.pred-box{background:linear-gradient(135deg,rgba(244,114,182,.08),rgba(167,139,250,.08));border:1px solid rgba(244,114,182,.3);border-radius:12px;padding:16px;margin-bottom:20px}
.pred-title{font-size:13px;font-weight:600;color:var(--pink);margin-bottom:12px}
.pred-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;text-align:center}
.pred-label{font-size:11px;color:var(--muted2);margin-bottom:4px}
.pred-val{font-size:15px;font-weight:700}

/* ── CODE BLOCK ── */
.code-block{background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:14px;font-size:11px;color:var(--acc);overflow-x:auto;font-family:var(--mono);line-height:1.7;white-space:pre}

/* ── SETTINGS GUIDE ── */
.guide-step{display:flex;gap:12px;margin-bottom:14px;align-items:flex-start}
.step-num{width:26px;height:26px;background:rgba(0,212,170,.15);color:var(--acc);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:1px}

/* ── HEALTH SCORE ── */
.score-ring{position:relative;width:100px;height:100px}
.score-ring canvas{position:absolute;top:0;left:0}
.score-ring-val{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:800}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  #sidebar{position:absolute;height:100%;z-index:50}
  .grid2,.grid3,.grid4{grid-template-columns:1fr}
  .pred-grid{grid-template-columns:1fr 1fr}
}
</style>
</head>
<body>

<div id="toast"></div>
<div id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<div id="app"></div>

<script>
// ══════════════════════════════════════════════
//  CONSTANTS & CONFIG
// ══════════════════════════════════════════════
const VERSION = '1.0.0';

const NAV_ITEMS = [
  {id:'dashboard',  icon:'🏠', label:'Dashboard'},
  {id:'medical',    icon:'📋', label:'Rekam Medis'},
  {id:'lab',        icon:'🔬', label:'Hasil Lab'},
  {id:'exercise',   icon:'🏃', label:'Latihan Fisik'},
  {id:'symptoms',   icon:'🤒', label:'Gejala'},
  {id:'menstruation',icon:'🩷',label:'Menstruasi & Nifas'},
  {id:'immunization',icon:'💉',label:'Imunisasi & Vaksin'},
  {id:'spo2',       icon:'💓', label:'SpO2 & Detak'},
  {id:'sleep',      icon:'😴', label:'Pola Tidur'},
  {id:'nutrition',  icon:'🥗', label:'Makanan & Minuman'},
  {id:'illness',    icon:'🤧', label:'Riwayat Sakit'},
  {id:'doctor',     icon:'👨‍⚕️',label:'Dokter & Diagnosa'},
  {id:'medications',icon:'💊', label:'Obat'},
  {id:'conditions', icon:'🩹', label:'Kondisi & Cedera'},
  {id:'lifestyle',  icon:'🌿', label:'Kebiasaan Hidup'},
  {id:'genetic',    icon:'🧬', label:'Penyakit Genetik'},
  {id:'allergies',  icon:'⚠️', label:'Alergi & Intoleransi'},
  {id:'analytics',  icon:'📊', label:'Analisis Data'},
  {id:'settings',   icon:'⚙️', label:'Pengaturan'},
];

const DEFAULT_MEMBERS = [
  {id:1,name:'Ayah',role:'Kepala Keluarga',pin:'1234',avatar:'👨',gender:'male',birthDate:'1975-05-15',bloodType:'O+',height:170,weight:72},
  {id:2,name:'Ibu',role:'Ibu',pin:'5678',avatar:'👩',gender:'female',birthDate:'1978-08-20',bloodType:'A+',height:160,weight:58},
  {id:3,name:'Anak 1',role:'Anak',pin:'1111',avatar:'👦',gender:'male',birthDate:'2005-03-10',bloodType:'O+',height:165,weight:55},
  {id:4,name:'Anak 2',role:'Anak',pin:'2222',avatar:'👧',gender:'female',birthDate:'2010-07-25',bloodType:'A+',height:145,weight:40},
];

const mkHealth = () => ({
  medicalRecords:[],labResults:[],exercise:[],symptoms:[],
  menstruation:[],immunization:[],spo2:[],sleep:[],nutrition:[],
  illness:[],doctorPlans:[],medications:[],conditions:[],lifestyle:[],
  geneticDiseases:[],allergies:[]
});

// ══════════════════════════════════════════════
//  STATE
// ══════════════════════════════════════════════
const S = {
  screen: 'login',   // 'login' | 'app'
  user: null,
  module: 'dashboard',
  sidebarCollapsed: false,
  memberDropdown: false,
  sheetUrl: '',
  syncStatus: '',
  syncLoading: false,
  familyData: { members: [...DEFAULT_MEMBERS] },
  healthData: {},

  // Login flow
  loginStep: 1,      // 1=sheet 2=member 3=pin
  loginSheetUrl: '',
  loginMemberId: null,
  loginPin: '',
  loginError: '',

  _charts: {},
};

// Init empty health data
DEFAULT_MEMBERS.forEach(m => { S.healthData[m.id] = mkHealth(); });

// ══════════════════════════════════════════════
//  UTILS
// ══════════════════════════════════════════════
const uid = () => Date.now().toString(36) + Math.random().toString(36).substr(2,5);
const today = () => new Date().toISOString().split('T')[0];
const fmt = d => d ? new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short',year:'numeric'}) : '-';
const fmtShort = d => d ? new Date(d).toLocaleDateString('id-ID',{day:'2-digit',month:'short'}) : '-';
const age = dob => { if(!dob) return '-'; return Math.floor((Date.now()-new Date(dob).getTime())/31536000000)+' thn'; };
const bmi = (h,w) => h&&w ? (w/((h/100)**2)).toFixed(1) : '-';
const bmiLabel = v => { const n=parseFloat(v); if(!n) return ''; if(n<18.5) return 'Kurus'; if(n<25) return 'Normal'; if(n<30) return 'Gemuk'; return 'Obesitas'; };
const bmiColor = v => { const l=bmiLabel(v); return l==='Normal'?'var(--green)':l==='Kurus'?'var(--acc2)':'var(--orange)'; };
const colorFor = s => ({ringan:'var(--yellow)',sedang:'var(--orange)',parah:'var(--red)','sangat parah':'var(--red)',normal:'var(--green)',tinggi:'var(--red)',rendah:'var(--orange)',kritis:'var(--red)'})[s]||'var(--muted)';
const esc = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg, type='') {
  const el = document.getElementById('toast');
  el.textContent = msg; el.className = 'show ' + type;
  clearTimeout(el._t); el._t = setTimeout(() => el.className='', 3000);
}

function getH() { return S.user ? (S.healthData[S.user.id] || mkHealth()) : mkHealth(); }
function setH(module, val) {
  if(!S.user) return;
  if(!S.healthData[S.user.id]) S.healthData[S.user.id] = mkHealth();
  S.healthData[S.user.id][module] = val;
  autoSync();
}

function predictMenstruation(records) {
  if(!records||records.length<2) return null;
  const sorted = [...records].filter(r=>r.type==='menstruasi').sort((a,b)=>new Date(b.startDate)-new Date(a.startDate));
  if(sorted.length<1) return null;
  const latest = sorted[0];
  const avgCycle = sorted.slice(0,4).reduce((s,r)=>s+(r.cycle||28),0)/Math.min(4,sorted.length);
  const nextStart = new Date(latest.startDate);
  nextStart.setDate(nextStart.getDate()+Math.round(avgCycle));
  const ovulation = new Date(nextStart);
  ovulation.setDate(ovulation.getDate()-14);
  const fertile1 = new Date(ovulation); fertile1.setDate(fertile1.getDate()-3);
  const fertile2 = new Date(ovulation); fertile2.setDate(fertile2.getDate()+3);
  return {
    nextStart: nextStart.toISOString().split('T')[0],
    ovulation: ovulation.toISOString().split('T')[0],
    fertileStart: fertile1.toISOString().split('T')[0],
    fertileEnd: fertile2.toISOString().split('T')[0],
    avgCycle: Math.round(avgCycle)
  };

//  GOOGLE SHEETS API LAYER
// ══════════════════════════════════════════════
// Expects an Apps Script Web App URL stored in S.sheetUrl
// The Apps Script must handle GET ?action=getData and POST with JSON body

async function sheetGet(action, params='') {
  if(!S.sheetUrl) return null;
  try {
    const url = S.sheetUrl + (S.sheetUrl.includes('?')?'&':'?') + 'action=' + action + (params?'&'+params:'');
    const r = await fetch(url);
    if(!r.ok) throw new Error('HTTP '+r.status);
    const txt = await r.text();
    // Handle JSONP or plain JSON
    const clean = txt.trim().replace(/^\/\*.*?\*\//,'').trim();
    return JSON.parse(clean);
  } catch(e) { return null; }
}

async function sheetPost(body) {
  if(!S.sheetUrl) return null;
  try {
    const r = await fetch(S.sheetUrl, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify(body),
      mode:'no-cors' // Apps Script requires no-cors
    });
    return true;
  } catch(e) { return null; }
}

let autoSyncTimer = null;
function autoSync() {
  clearTimeout(autoSyncTimer);
  autoSyncTimer = setTimeout(() => syncToSheet(true), 3000);
}

async function syncToSheet(silent=false) {
  if(!S.sheetUrl || !S.user) return;
  S.syncStatus = '🔄 Menyinkronkan...';
  if(!silent) renderApp();
  await sheetPost({
    action: 'saveData',
    memberId: S.user.id,
    familyData: S.familyData,
    healthData: S.healthData,
    savedAt: new Date().toISOString()
  });
  S.syncStatus = '✅ Tersinkronisasi ' + new Date().toLocaleTimeString('id-ID');
  if(!silent) renderApp(); else {
    const el = document.getElementById('sync-status-bar');
    if(el) el.textContent = S.syncStatus;
  }
}

async function syncFromSheet() {
  if(!S.sheetUrl) return false;
  S.syncStatus = '🔄 Memuat dari Spreadsheet...';
  renderApp();
  const data = await sheetGet('getData');
  if(data && data.familyData && data.healthData) {
    S.familyData = data.familyData;
    S.healthData = data.healthData;
    // Ensure health data exists for all members
    S.familyData.members.forEach(m => { if(!S.healthData[m.id]) S.healthData[m.id]=mkHealth(); });
    S.syncStatus = '✅ Data dimuat dari Spreadsheet';
    toast('Data berhasil dimuat dari Spreadsheet!','success');
    return true;
  }
  S.syncStatus = '⚠️ Tidak dapat terhubung ke Spreadsheet (menggunakan data lokal)';
  toast('Tidak dapat terhubung ke Spreadsheet, menggunakan data lokal','');
  return false;
}

// Form fields renderer
function renderFormFields(fields, data={}) {
  return fields.map(f => {
    if(f.type==='checkbox') return `
      <label class="checkbox-row">
        <input type="checkbox" name="${f.name}" ${data[f.name]?'checked':''}>
        ${f.label}
      </label>`;
    if(f.type==='select') return `
      <div class="form-group">
        <label class="fl">${f.label}${f.req?'<span class="req"> *</span>':''}</label>
        <select name="${f.name}">
          ${f.placeholder?`<option value="">${f.placeholder}</option>`:''}
          ${f.options.map(o=>`<option value="${esc(o.value||o)}" ${(data[f.name]====(o.value||o))?'selected':''}>${esc(o.label||o)}</option>`).join('')}
        </select>
      </div>`;
    if(f.type==='textarea') return `
      <div class="form-group">
        <label class="fl">${f.label}</label>
        <textarea name="${f.name}" rows="${f.rows||3}" placeholder="${f.placeholder||''}">${esc(data[f.name]||'')}</textarea>
      </div>`;
    if(f.type==='range') return `
      <div class="form-group">
        <label class="fl">${f.label}: <strong id="range-val-${f.name}">${data[f.name]||f.min||1}</strong></label>
        <input type="range" name="${f.name}" min="${f.min||1}" max="${f.max||10}" 
          value="${data[f.name]||f.min||1}"
          oninput="document.getElementById('range-val-${f.name}').textContent=this.value">
      </div>`;
    return `
      <div class="form-group">
        <label class="fl">${f.label}${f.req?'<span class="req"> *</span>':''}</label>
        <input type="${f.type||'text'}" name="${f.name}" value="${esc(data[f.name]||f.default||'')}" placeholder="${f.placeholder||''}">
      </div>`;
  }).join('');
}

function collectForm(modal) {
  const data = {};
  modal.querySelectorAll('[name]').forEach(el => {
    data[el.name] = el.type==='checkbox' ? el.checked : el.value;
  });
  return data;
}

let _currentFormModule = null;
let _currentEditId = null;
let _formFields = [];
let _makeDefault = null;

const MODULE_CONFIGS = {}; // Filled below

function openAddModal(module) {
  const cfg = MODULE_CONFIGS[module];
  if(!cfg) return;
  _currentFormModule = module; _currentEditId = null; _formFields = cfg.fields; _makeDefault = cfg.makeDefault;
  const defaultData = cfg.makeDefault();
  openModal(`+ Tambah ${cfg.title}`, `<div class="form-stack">${renderFormFields(cfg.fields, defaultData)}</div>`,
    [{label:'Simpan',cls:'btn-primary',fn:'submitForm()'},{label:'Batal',cls:'btn-secondary',fn:'closeModal()'}], cfg.wide);
}

function openEditModal(module, id) {
  const cfg = MODULE_CONFIGS[module];
  if(!cfg) return;
  const item = getH()[module]?.find(x=>x.id===id);
  if(!item) return;
  _currentFormModule = module; _currentEditId = id; _formFields = cfg.fields; _makeDefault = cfg.makeDefault;
  openModal(`✏️ Edit ${cfg.title}`, `<div class="form-stack">${renderFormFields(cfg.fields, item)}</div>`,
    [{label:'Simpan Perubahan',cls:'btn-primary',fn:'submitForm()'},{label:'Batal',cls:'btn-secondary',fn:'closeModal()'}], cfg.wide);
}

function submitForm() {
  const modal = document.getElementById('modal-box');
  if(!modal||!_currentFormModule) return;
  const data = collectForm(modal);
  const m = _currentFormModule;
  const h = getH();
  if(_currentEditId) {
    setH(m, h[m].map(x=>x.id===_currentEditId?{...x,...data}:x));
  } else {
    setH(m, [...(h[m]||[]), {...(_makeDefault?_makeDefault():{}), ...data, id:uid()}]);
  }
  closeModal();
  toast('Data berhasil disimpan ✓','success');
  setTimeout(()=>renderModule(),100);
}

function deleteItem(module, id) {
  if(!confirm('Hapus data ini?')) return;
  const h = getH();
  setH(module, h[module].filter(x=>x.id!==id));
  document.getElementById('item-'+id)?.remove();
  toast('Data dihapus','');
}

function filterList(module, q) {
  const list = document.getElementById('list-'+module);
  if(!list) return;
  list.querySelectorAll('.list-item').forEach(el => {
    el.style.display = el.textContent.toLowerCase().includes(q.toLowerCase()) ? '' : 'none';
  });
}

// ── DASHBOARD ──
function dashboard() {
  const u = S.user; const h = getH();
  const bv = bmi(u.height, u.weight);
  const latestSpo2 = [...h.spo2].sort((a,b)=>new Date(b.date+b.time)-new Date(a.date+a.time))[0];
  const latestSleep = [...h.sleep].sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
  const activeMeds = h.medications.filter(m=>m.active||m.active==='true');
  const upcomingDoc = h.doctorPlans.filter(p=>new Date(p.date)>=new Date()).sort((a,b)=>new Date(a.date)-new Date(b.date))[0];
  const menPred = u.gender==='female' ? predictMenstruation(h.menstruation) : null;
  const totalCal = h.exercise.reduce((s,e)=>s+(parseFloat(e.calories)||0),0);

  // Family alerts
  const alerts = [];
  S.familyData.members.forEach(m => {
    const mh = S.healthData[m.id]||mkHealth();
    (mh.spo2||[]).filter(s=>parseFloat(s.value)<95).slice(-1).forEach(s=>
      alerts.push({av:m.avatar,name:m.name,text:`SpO2 rendah: ${s.value}%`,color:'var(--red)'}));
    (mh.doctorPlans||[]).filter(p=>{const d=(new Date(p.date)-new Date())/86400000;return d>=0&&d<=7;}).slice(0,1).forEach(p=>
      alerts.push({av:m.avatar,name:m.name,text:`Jadwal dokter: ${fmt(p.date)}`,color:'var(--orange)'}));
  });

  // Chart data
  const exChart = [...h.exercise].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-7)
    .map(e=>({label:fmtShort(e.date),cal:parseFloat(e.calories)||0,dur:parseFloat(e.duration)||0}));

  const spo2Chart = [...h.spo2].sort((a,b)=>new Date(a.date)-new Date(b.date)).slice(-10)
    .map(s=>({label:fmtShort(s.date),val:parseFloat(s.value)||0}));

  setTimeout(()=>{
    drawBar('chart-ex', exChart.map(x=>x.label), [
      {label:'Kalori',data:exChart.map(x=>x.cal),color:'rgba(0,212,170,0.8)'},
      {label:'Menit',data:exChart.map(x=>x.dur),color:'rgba(14,165,233,0.8)'},
    ]);
    if(spo2Chart.length>1) drawLine('chart-spo2', spo2Chart.map(x=>x.label), [
      {label:'SpO2 %',data:spo2Chart.map(x=>x.val),color:'var(--acc)'}
    ], {min:85,max:100});
  },50);

  return `
<div>
  <div style="margin-bottom:24px">
    <div style="font-size:22px;font-weight:700">Selamat datang, ${esc(u.name)} ${u.avatar}</div>
    <div style="color:var(--muted2);font-size:13px;margin-top:4px">${new Date().toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</div>
    ${S.syncStatus?`<div style="font-size:11px;color:var(--muted2);margin-top:4px" id="sync-status-bar">${esc(S.syncStatus)}</div>`:''}
  </div>

  <div class="stat-grid">
    ${statCard('⚖️','BMI',bv,bmiLabel(bv),bmiColor(bv))}
    ${statCard('💓','SpO2 Terakhir',latestSpo2?latestSpo2.value+'%':'-',latestSpo2?'HR: '+(latestSpo2.hr||'-')+' bpm':'Belum ada data',latestSpo2&&parseFloat(latestSpo2.value)>=95?'var(--green)':'var(--red)')}
    ${statCard('😴','Tidur Terakhir',latestSleep?latestSleep.duration+'j':'-',latestSleep?.quality||'Belum ada data','var(--purple)')}
    ${statCard('💊','Obat Aktif',activeMeds.length,activeMeds[0]?.name||'Tidak ada','var(--pink)')}
    ${statCard('🏃','Total Latihan',h.exercise.length,totalCal+' kkal total','var(--acc2)')}
    ${menPred?statCard('🩷','Haid Berikutnya',fmt(menPred.nextStart),'Siklus ~'+menPred.avgCycle+' hari','var(--pink)'):''}
  </div>

  <div style="display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:16px">
    <div class="card">
      <div class="card-title">🏃 Aktivitas Latihan (7 Hari Terakhir)</div>
      ${exChart.length>0?`<div class="chart-wrap"><canvas id="chart-ex"></canvas></div>`
        :`<div class="empty"><div class="empty-icon">🏃</div><div class="empty-text">Belum ada data latihan</div></div>`}
    </div>
    <div class="card">
      <div class="card-title">📊 Info Kesehatan</div>
      ${[
        ['🩸 Golongan Darah',u.bloodType||'-','var(--red)'],
        ['📏 Tinggi',u.height?u.height+' cm':'-','var(--acc2)'],
        ['⚖️ Berat',u.weight?u.weight+' kg':'-','var(--orange)'],
        ['🎂 Usia',age(u.birthDate),'var(--purple)'],
        ['⚠️ Alergi',h.allergies.length||'Tidak ada','var(--yellow)'],
        ['🏥 Penyakit Kronis',h.conditions.filter(c=>c.chronic||c.chronic==='true').length||'Tidak ada','var(--pink)'],
      ].map(([l,v,c])=>`
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid var(--border)">
          <span style="font-size:12px;color:var(--muted2)">${l}</span>
          <span style="font-size:13px;font-weight:600;color:${c}">${esc(v)}</span>
        </div>`).join('')}
    </div>
  </div>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
    <div class="card">
      <div class="card-title">💓 Tren SpO2</div>
      ${spo2Chart.length>1?`<div class="chart-wrap"><canvas id="chart-spo2"></canvas></div>`
        :`<div class="empty"><div class="empty-icon">💓</div><div class="empty-text">Belum ada data SpO2</div></div>`}
    </div>
    <div class="card">
      <div class="card-title">⚠️ Notifikasi Keluarga</div>
      ${alerts.length===0
        ?`<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Semua kondisi keluarga baik</div></div>`
        :alerts.map(a=>`
          <div style="padding:8px 10px;background:var(--card2);border-radius:8px;margin-bottom:6px;border-left:3px solid ${a.color}">
            <div style="font-size:12px;font-weight:600">${a.av} ${esc(a.name)}</div>
            <div style="font-size:11px;color:var(--muted2)">${esc(a.text)}</div>
          </div>`).join('')}
      ${upcomingDoc?`
        <div style="margin-top:8px;padding:10px;background:rgba(14,165,233,.08);border:1px solid rgba(14,165,233,.2);border-radius:8px">
          <div style="font-size:11px;color:var(--acc2);font-weight:600;margin-bottom:4px">📅 Jadwal Dokter Terdekat</div>
          <div style="font-size:13px;font-weight:600">dr. ${esc(upcomingDoc.doctor)}</div>
          <div style="font-size:12px;color:var(--muted2)">${fmt(upcomingDoc.date)} ${upcomingDoc.time||''} • ${esc(upcomingDoc.location||'')}</div>
        </div>`:''}
    </div>
  </div>
</div>`;
}

function statCard(icon,label,value,sub,color='var(--acc)') {
  return `<div class="stat-card">
    <div class="stat-icon" style="background:${color}18">${icon}</div>
    <div>
      <div class="stat-label">${label}</div>
      <div class="stat-value" style="color:${color}">${esc(String(value))}</div>
      ${sub?`<div class="stat-sub">${esc(String(sub))}</div>`:''}
    </div>
  </div>`;
}

// ── EXERCISE ──
function exercise() {
  const h = getH();
  const totalCal = h.exercise.reduce((s,e)=>s+(parseFloat(e.calories)||0),0);
  const thisWeek = h.exercise.filter(e=>(Date.now()-new Date(e.date).getTime())<7*86400000)
                             .reduce((s,e)=>s+(parseFloat(e.calories)||0),0);
  const types={};h.exercise.forEach(e=>{types[e.type]=(types[e.type]||0)+1;});
  const fav = Object.entries(types).sort((a,b)=>b[1]-a[1])[0]?.[0]||'-';

  return `<div>
    <div class="stat-grid">${[
      statCard('🔥','Kalori Minggu Ini',thisWeek,'kkal','var(--orange)'),
      statCard('📅','Total Sesi',h.exercise.length,'semua waktu','var(--acc)'),
      statCard('🏆','Olahraga Favorit',fav,'','var(--purple)'),
    ].join('')}</div>
    ${crudModule({
      title:'Latihan Fisik', icon:'🏃', module:'exercise', items:h.exercise,
      sortFn:(a,b)=>new Date(b.date)-new Date(a.date),
      renderItem: item => `
        <div class="badge-row">${item.type?tag(item.type,'var(--acc)'):''} ${tag(fmt(item.date),'var(--muted2)')}</div>
        <div class="list-secondary" style="margin-top:4px;font-size:13px;gap:14px">
          ${item.duration?`<span>⏱️ <b>${item.duration}</b> menit</span>`:''}
          ${item.distance?`<span>📏 <b>${item.distance}</b> km</span>`:''}
          ${item.calories?`<span>🔥 <b>${item.calories}</b> kkal</span>`:''}
          ${item.hr?`<span>💓 <b>${item.hr}</b> bpm</span>`:''}
        </div>
        ${item.notes?`<div class="list-meta">${esc(item.notes)}</div>`:''}
      `
    })}
  </div>`;
}

// ── MENSTRUATION ──
function menstruation() {
  const h = getH(); const u = S.user;
  const pred = predictMenstruation(h.menstruation);
  const genderNote = u.gender!=='female' ? `<div class="card" style="border-color:rgba(244,114,182,.2);margin-bottom:16px">
    <p style="color:var(--muted);font-size:13px">⚠️ Modul ini untuk anggota perempuan. Data tetap bisa dicatat jika diperlukan.</p></div>` : '';

  const cycleData = h.menstruation.filter(r=>r.type==='menstruasi').slice(-8).map((m,i)=>({
    label:`Siklus ${i+1}`, val:parseFloat(m.cycle)||28
  }));

  setTimeout(()=>{
    if(cycleData.length>1) drawLine('chart-cycle', cycleData.map(x=>x.label), [
      {label:'Hari Siklus',data:cycleData.map(x=>x.val),color:'var(--pink)'}
    ],{min:20,max:40});
  },50);

  return `<div>
    ${genderNote}
    <div class="section-head">
      <div class="section-title">🩷 Menstruasi & Nifas</div>
      <button class="btn btn-primary btn-sm" onclick="openAddModal('menstruation')">+ Tambah</button>
    </div>
    ${pred?`
    <div class="pred-box">

// ── ANALYTICS ──
function analytics() {
  const h = getH(); const u = S.user;
  const avgSpo2 = h.spo2.length?(h.spo2.reduce((s,x)=>s+(parseFloat(x.value)||0),0)/h.spo2.length):0;
  const avgSleep = h.sleep.length?(h.sleep.reduce((s,x)=>s+(parseFloat(x.duration)||0),0)/h.sleep.length):0;
  const score = Math.min(100,Math.round(
    (avgSpo2>=95?25:avgSpo2>=90?15:5)+
    (avgSleep>=7?25:avgSleep>=6?15:5)+
    (h.exercise.length>=12?25:h.exercise.length*2)+
    (h.allergies.length===0?10:5)+
    (h.conditions.filter(c=>c.chronic||c.chronic==='true').length===0?15:5)
  ));
  const scoreColor = score>=80?'var(--green)':score>=60?'var(--yellow)':'var(--red)';
  const exByType = {};h.exercise.forEach(e=>{exByType[e.type]=(exByType[e.type]||0)+1;});
  const exTypeKeys = Object.keys(exByType);
  const monthCal = {};h.exercise.forEach(e=>{const m=e.date?.substr(0,7);if(m){monthCal[m]=(monthCal[m]||0)+(parseFloat(e.calories)||0);}});
  const monthCalArr = Object.entries(monthCal).sort().slice(-6);

  setTimeout(()=>{
    if(exTypeKeys.length) drawPie('chart-types',exTypeKeys,exTypeKeys.map(k=>exByType[k]));
    if(monthCalArr.length>1) drawBar('chart-monthly-cal',monthCalArr.map(x=>x[0]),[
      {label:'Kalori',data:monthCalArr.map(x=>x[1]),color:'rgba(0,212,170,0.8)'}
    ]);
  },50);

  const modules = [
    ['📋','Rekam Medis',h.medicalRecords.length,'var(--acc)'],
    ['🔬','Hasil Lab',h.labResults.length,'var(--acc2)'],
    ['💉','Vaksin',h.immunization.length,'var(--green)'],
    ['💊','Obat',h.medications.length,'var(--pink)'],
    ['⚠️','Alergi',h.allergies.length,'var(--red)'],
    ['🧬','Genetik',h.geneticDiseases.length,'var(--purple)'],
    ['🩹','Kondisi',h.conditions.length,'var(--orange)'],
    ['🤒','Gejala',h.symptoms.length,'var(--yellow)'],
  ];

  return `<div>
    <div class="section-title" style="margin-bottom:20px">📊 Analisis Kesehatan — ${u.avatar} ${esc(u.name)}</div>

function settings() {

// Tempel kode ini di Extensions → Apps Script
// lalu Deploy → New Deployment → Web App
// Execute as: Me | Access: Anyone

const SHEET_NAME = 'HealthData';
const FAMILY_SHEET = 'FamilyData';

function doGet(e) {
  try {
    const action = e.parameter.action;
    if (action === 'getData') {
      return getData();
    }
    return resp({status:'ok',message:'FamilyHealth API'});
  } catch(err) {
    return resp({status:'error',message:err.toString()});
  }
}

function doPost(e) {
  try {
    const body = JSON.parse(e.postData.contents);
    if (body.action === 'saveData') {
      return saveData(body);
    }
    return resp({status:'ok'});
  } catch(err) {
    return resp({status:'error',message:err.toString()});
  }
}

function getData() {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  const sheet = ss.getSheetByName(SHEET_NAME);
  if (!sheet) return resp({status:'empty'});
  const data = sheet.getRange(1,1).getValue();
  if (!data) return resp({status:'empty'});
  return resp(JSON.parse(data));
}

function saveData(body) {
  const ss = SpreadsheetApp.getActiveSpreadsheet();
  let sheet = ss.getSheetByName(SHEET_NAME);
  if (!sheet) sheet = ss.insertSheet(SHEET_NAME);
  
  // Store as JSON in cell A1
  sheet.getRange(1,1).setValue(JSON.stringify({
    familyData: body.familyData,
    healthData: body.healthData,
    lastSaved: new Date().toISOString()
  }));
  
  // Also write readable log to row 3+
  let logSheet = ss.getSheetByName('SyncLog');
  if (!logSheet) logSheet = ss.insertSheet('SyncLog');
  logSheet.appendRow([new Date(), body.memberId, 'sync', body.savedAt]);
  
  return resp({status:'saved'});
}

function resp(data) {
  return ContentService
    .createTextOutput(JSON.stringify(data))
    .setMimeType(ContentService.MimeType.JSON);
}`;

function attachModuleEvents() {
  // Settings tabs
  document.querySelectorAll('#settings-tabs .tab-btn').forEach(btn => {
    btn.onclick = () => {
      document.querySelectorAll('#settings-tabs .tab-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      document.querySelectorAll('.tab-content').forEach(t=>t.style.display='none');
      const tab = document.getElementById('tab-'+btn.dataset.tab);
      if(tab) tab.style.display='block';
    };
  });

// Settings actions (global)
function doExportJSON() {
  const data = {version:VERSION, familyData:S.familyData, healthData:S.healthData, exportedAt:new Date().toISOString()};
  const blob = new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url = URL.createObjectURL(blob); const a=document.createElement('a');
  a.href=url; a.download=`familyhealth_${today()}.json`; a.click(); URL.revokeObjectURL(url);
  toast('Data diekspor!','success');
}

function doExportCSV(memberId) {
  const m = S.familyData.members.find(x=>x.id===memberId);
  const h = S.healthData[memberId]||{};
  const rows = [['Modul','Tanggal','Data']];
  Object.entries(h).forEach(([mod,items])=>{
    if(Array.isArray(items)) items.forEach(item=>
      rows.push([mod,item.date||item.startDate||'',JSON.stringify(item)]));
  });
  const csv = rows.map(r=>r.map(c=>`"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
  const blob=new Blob([csv],{type:'text/csv'}); const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=`${m?.name||'member'}_${today()}.csv`; a.click();
  URL.revokeObjectURL(url); toast('CSV diekspor!','success');
}

function doImportJSON(input) {
  const file = input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(d.familyData && d.healthData) {
        S.familyData = d.familyData; S.healthData = d.healthData;
        toast('Data berhasil diimpor!','success'); renderModule();
      } else toast('Format file tidak valid','error');
    } catch { toast('File rusak atau format salah','error'); }
  };
  reader.readAsText(file);
}

function pickAvatar(el, av) {
  document.querySelectorAll('.avatar-pick').forEach(b=>b.style.borderColor='var(--border)');
  el.style.borderColor='var(--acc)';
  const inp = document.getElementById('nm-avatar'); if(inp) inp.value = av;
}

function addMember() {
  const name = document.getElementById('nm-name')?.value?.trim();
  const pin = document.getElementById('nm-pin')?.value;
  if(!name||!pin) { toast('Nama dan PIN wajib diisi','error'); return; }
  const id = Math.max(...S.familyData.members.map(m=>m.id))+1;
  const newM = {
    id, name,
    role: document.getElementById('nm-role')?.value||'Anggota',
    pin,
    avatar: document.getElementById('nm-avatar')?.value||'👤',
    gender: document.getElementById('nm-gender')?.value||'male',
    birthDate: document.getElementById('nm-birthdate')?.value||'',
    bloodType: document.getElementById('nm-blood')?.value||'',
    height:'', weight:'',
  };
  S.familyData.members.push(newM);
  S.healthData[id] = mkHealth();
  autoSync(); toast('Anggota berhasil ditambahkan!','success'); renderModule();
}

// ── SHARE ──
function shareItem(module, id) {
  const h = getH();
  const item = h[module]?.find(x=>x.id===id);
  if(!item) return;
  let text = '';
  if(module==='exercise') text = `🏃 Aktivitas ${item.type||''} saya!\n📅 ${fmt(item.date)}\n⏱️ ${item.duration||'?'} menit${item.distance?`\n📏 ${item.distance} km`:''}${item.calories?`\n🔥 ${item.calories} kkal terbakar`:''}${item.hr?`\n💓 HR: ${item.hr} bpm`:''}\n${item.notes||''}\n#HealthyLifestyle #FamilyHealth`;
  else if(module==='nutrition') text = `🥗 Makan ${item.mealType||''} saya!\n📅 ${fmt(item.date)}\n🍽️ ${item.foods}${item.calories?`\n🔥 ${item.calories} kkal`:''}\n#HealthyEating #CleanFood`;
  else if(module==='spo2') text = `💓 Status kesehatan hari ini!\n📅 ${fmt(item.date)} ${item.time||''}\nSpO2: ${item.value}% • HR: ${item.hr||'?'} bpm\n#HealthMonitor`;
  else if(module==='sleep') text = `😴 Tidur ${item.duration||'?'} jam semalam!\n📅 ${fmt(item.date)}\nKualitas: ${item.quality||'-'}\n#SleepWell #HealthyHabits`;
  if(text) {
    navigator.clipboard?.writeText(text).then(()=>toast('Caption disalin! Siap dibagikan ke media sosial 🎉','success'))
    .catch(()=>{ prompt('Salin teks ini:',text); });
  }
}

const CHART_DEFAULTS = {
  color:'rgba(255,255,255,0.1)',
  tick:{color:'#5A7A90',font:{size:10,family:'DM Sans'}},
  tooltip:{background:'#0F1D30',border:'#1F3348',bodyColor:'#E8F0F5',titleColor:'#E8F0F5'},

function mkChartOpts(extra={}) {
  return {
    responsive:true, maintainAspectRatio:false,
    plugins:{legend:{labels:{color:'#8BA3B5',font:{size:11}}}, tooltip:{backgroundColor:CHART_DEFAULTS.tooltip.background,borderColor:CHART_DEFAULTS.tooltip.border,borderWidth:1,bodyColor:CHART_DEFAULTS.tooltip.bodyColor,titleColor:CHART_DEFAULTS.tooltip.titleColor}},
    scales:{x:{grid:{color:CHART_DEFAULTS.color},ticks:CHART_DEFAULTS.tick},y:{grid:{color:CHART_DEFAULTS.color},ticks:CHART_DEFAULTS.tick}},
    ...extra
  };
}

function drawBar(id, labels, datasets) {
  const el = document.getElementById(id); if(!el) return;
  if(S._charts[id]) S._charts[id].destroy();
  const COLS=['rgba(0,212,170,0.8)','rgba(14,165,233,0.8)','rgba(167,139,250,0.8)','rgba(244,114,182,0.8)'];
  S._charts[id] = new Chart(el, {type:'bar',data:{labels,datasets:datasets.map((d,i)=>({...d,backgroundColor:d.color||COLS[i%COLS.length],borderRadius:4,borderSkipped:false}))},options:mkChartOpts()});
}

function drawLine(id, labels, datasets, yRange={}) {
  const el=document.getElementById(id); if(!el) return;
  if(S._charts[id]) S._charts[id].destroy();
  const COLS=['var(--acc)','var(--red)','var(--purple)','var(--orange)'];
  const opts = mkChartOpts();
  if(yRange.min!==undefined) opts.scales.y.min=yRange.min;
  if(yRange.max!==undefined) opts.scales.y.max=yRange.max;
  S._charts[id] = new Chart(el,{type:'line',data:{labels,datasets:datasets.map((d,i)=>({...d,borderColor:d.color||COLS[i%COLS.length],backgroundColor:(d.color||COLS[i%COLS.length]).replace('var(--acc)','rgba(0,212,170,0.1)').replace('var(--red)','rgba(248,113,113,0.1)').replace('var(--purple)','rgba(167,139,250,0.1)').replace('var(--orange)','rgba(251,146,60,0.1)'),fill:false,tension:.35,pointRadius:3,pointHoverRadius:5}))},options:opts});
}
