<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<title>VitaFam</title>
<meta name="theme-color" content="#05081A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Nunito:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#05081A;--bg2:#090E23;--sf:#0F1830;--sf2:#162040;--bd:rgba(90,130,255,.1);
  --t:#00DFC4;--t2:rgba(0,223,196,.12);--o:#FFB347;--o2:rgba(255,179,71,.12);
  --r:#FF6B8A;--r2:rgba(255,107,138,.12);--p:#A78BFA;--p2:rgba(167,139,250,.12);
  --b:#60A5FA;--b2:rgba(96,165,250,.12);--g:#4ADE80;--g2:rgba(74,222,128,.12);
  --pk:#F472B6;--pk2:rgba(244,114,182,.12);--y:#FACC15;--y2:rgba(250,204,21,.12);
  --tx:#DDE8FF;--tx2:#6B7FAA;--tx3:#2E3A5E;--rr:14px;--rs:10px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;font-family:'Nunito',sans-serif;background:var(--bg);color:var(--tx)}
body{display:flex;flex-direction:column;max-width:430px;margin:0 auto;position:relative}

/* HEADER */
#hdr{background:rgba(5,8,26,.95);border-bottom:1px solid var(--bd);padding:44px 14px 10px;display:flex;align-items:center;gap:8px;flex-shrink:0;z-index:20;backdrop-filter:blur(20px);position:sticky;top:0}
.logo-txt{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;background:linear-gradient(135deg,var(--t),var(--o));-webkit-background-clip:text;-webkit-text-fill-color:transparent;white-space:nowrap}
#ptabs{display:flex;gap:5px;flex:1;overflow-x:auto;scrollbar-width:none;justify-content:flex-end;padding-right:4px}
#ptabs::-webkit-scrollbar{display:none}
.pchip{display:flex;align-items:center;gap:4px;padding:4px 9px 4px 4px;border-radius:20px;border:1.5px solid var(--bd);background:transparent;color:var(--tx2);font-family:'Nunito',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.pchip.on{background:var(--t2);border-color:var(--t);color:var(--t)}
.pchip .av{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.62rem;font-weight:800}
.hbtn{width:28px;height:28px;border-radius:50%;border:1.5px solid var(--bd);background:transparent;color:var(--tx2);font-size:.85rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
.hbtn:hover,.hbtn:active{border-color:var(--t);color:var(--t)}

/* MAIN */
#main{flex:1;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;padding-bottom:calc(64px + env(safe-area-inset-bottom))}
#main::-webkit-scrollbar{display:none}

/* SECTIONS */
.sec{display:none;animation:fu .25s ease}
.sec.on{display:block}
@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* BOTTOM NAV */
#bnav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:430px;background:rgba(9,14,35,.97);border-top:1px solid var(--bd);display:flex;padding:5px 4px calc(5px + env(safe-area-inset-bottom));z-index:100;backdrop-filter:blur(20px)}
.ni{flex:1;display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 2px;background:none;border:none;cursor:pointer;border-radius:10px;color:var(--tx3);transition:all .2s}
.ni.on{color:var(--t)}
.ni .ic{font-size:1.15rem;line-height:1}
.ni .lb{font-size:.55rem;font-weight:700;font-family:'Nunito',sans-serif;white-space:nowrap}

/* PAGE HEADER */
.ph{padding:16px 14px 4px}
.ph-title{font-family:'Syne',sans-serif;font-size:1.2rem;font-weight:800}
.ph-sub{font-size:.72rem;color:var(--tx2);margin-top:2px}

/* CARDS */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rr);padding:12px 14px;margin:0 14px 9px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cc,var(--t));border-radius:3px 0 0 3px}
.ch{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:6px}
.ct{font-size:.85rem;font-weight:700}
.cd{font-size:.68rem;color:var(--tx2);margin-top:1px}
.cbtns{display:flex;gap:2px;flex-shrink:0}
.cbtn{background:none;border:none;color:var(--tx3);cursor:pointer;padding:3px 5px;font-size:.72rem;transition:color .15s;line-height:1;border-radius:6px}
.cbtn:hover{color:var(--t);background:var(--t2)}
.cbtn.del:hover{color:var(--r);background:var(--r2)}
.tags{display:flex;gap:5px;flex-wrap:wrap;margin-top:5px}
.tag{padding:3px 8px;border-radius:20px;font-size:.65rem;font-weight:600;background:rgba(255,255,255,.05);color:var(--tx2);white-space:nowrap}
.tag.t{background:var(--t2);color:var(--t)}.tag.o{background:var(--o2);color:var(--o)}
.tag.r{background:var(--r2);color:var(--r)}.tag.p{background:var(--p2);color:var(--p)}
.tag.b{background:var(--b2);color:var(--b)}.tag.g{background:var(--g2);color:var(--g)}
.tag.pk{background:var(--pk2);color:var(--pk)}.tag.y{background:var(--y2);color:var(--y)}

/* SECTION DIVIDER */
.sdiv{padding:12px 14px 4px;font-family:'Syne',sans-serif;font-size:.75rem;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.6px}

/* PILL ROW */
.pills{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;padding:4px 14px 8px}
.pills::-webkit-scrollbar{display:none}
.pill{padding:5px 13px;border-radius:20px;font-size:.7rem;font-weight:700;cursor:pointer;white-space:nowrap;border:1.5px solid var(--bd);background:transparent;color:var(--tx2);font-family:'Nunito',sans-serif;transition:all .2s;flex-shrink:0}
.pill.on{background:var(--t2);border-color:var(--t);color:var(--t)}

/* HERO CARD */
.hero{background:linear-gradient(135deg,var(--sf),var(--sf2));border:1px solid var(--bd);border-radius:var(--rr);padding:14px;margin:8px 14px 12px}
.htitle{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:2px}
.hsub{font-size:.7rem;color:var(--tx2);margin-bottom:10px}

/* STAT GRIDS */
.sg2{display:grid;grid-template-columns:1fr 1fr;gap:7px;padding:0 14px;margin-bottom:10px}
.sg3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;padding:0 14px;margin-bottom:10px}
.sg4{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:6px;padding:0 14px;margin-bottom:10px}
.sb{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rs);padding:10px 8px;text-align:center}
.sv{font-family:'Syne',sans-serif;font-size:1.05rem;font-weight:800;line-height:1}
.sl{font-size:.6rem;color:var(--tx2);margin-top:2px}

/* FORMS */
.fg{margin-bottom:11px}
label{display:block;font-size:.68rem;font-weight:700;color:var(--tx2);margin-bottom:4px;letter-spacing:.2px;text-transform:uppercase}
input,select,textarea{width:100%;background:var(--bg2);border:1.5px solid var(--bd);border-radius:var(--rs);padding:10px 12px;color:var(--tx);font-family:'Nunito',sans-serif;font-size:.85rem;outline:none;transition:border-color .2s}
input:focus,select:focus,textarea:focus{border-color:var(--t)}
select option{background:var(--sf)}
textarea{resize:vertical;min-height:70px}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.fr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.cbx{display:flex;align-items:center;gap:8px;padding:8px 0}
.cbx input{width:auto;flex-shrink:0;accent-color:var(--t)}
.cbx label{margin:0;color:var(--tx);font-size:.82rem;text-transform:none;letter-spacing:0}

/* BUTTONS */
.addbtn{width:calc(100% - 28px);margin:0 14px 12px;padding:11px;border-radius:var(--rs);border:1.5px dashed rgba(0,223,196,.3);background:var(--t2);color:var(--t);font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.addbtn:hover{background:rgba(0,223,196,.2)}
.sbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--t),#00A896);border:none;border-radius:var(--rs);color:#05081A;font-family:'Syne',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;margin-top:8px}
.sbtn.orange{background:linear-gradient(135deg,var(--o),#D07000)}
.sbtn.red{background:linear-gradient(135deg,var(--r),#CC2244)}

/* PROGRESS BAR */
.pb-wrap{margin:6px 0}
.pb-hd{display:flex;justify-content:space-between;font-size:.66rem;color:var(--tx2);margin-bottom:3px}
.pb-track{height:5px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.pb-fill{height:100%;border-radius:3px;background:var(--t);transition:width .7s ease}

/* MODAL */
#moverlay{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:200;display:none;align-items:flex-end;justify-content:center;padding-bottom:0}
#moverlay.on{display:flex}
#msheet{background:var(--sf);border-radius:22px 22px 0 0;border-top:1px solid var(--bd);width:100%;max-width:430px;max-height:93vh;overflow-y:auto;padding:0 16px calc(28px + env(safe-area-inset-bottom));scrollbar-width:none}
#msheet::-webkit-scrollbar{display:none}
.mhandle{width:34px;height:4px;background:var(--bd);border-radius:2px;margin:10px auto 14px}
.mtitle{font-family:'Syne',sans-serif;font-size:.95rem;font-weight:700;margin-bottom:14px;display:flex;align-items:center;gap:7px}

/* SUB-TABS INSIDE MODAL */
.mtabs{display:flex;background:var(--bg2);border-radius:var(--rs);padding:3px;margin-bottom:12px}
.mtab{flex:1;padding:7px 4px;background:transparent;border:none;color:var(--tx2);font-size:.68rem;font-weight:700;cursor:pointer;border-radius:7px;transition:all .2s;font-family:'Nunito',sans-serif}
.mtab.on{background:var(--sf);color:var(--t)}

/* TOAST */
#toast{position:fixed;bottom:calc(74px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(10px);background:var(--sf2);border:1px solid var(--t);border-radius:20px;padding:8px 16px;font-size:.76rem;font-weight:600;color:var(--t);z-index:300;opacity:0;transition:all .25s;white-space:nowrap;pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}

/* CONFIRM */
#conf-ov{position:fixed;inset:0;background:rgba(0,0,0,.82);z-index:400;display:none;align-items:center;justify-content:center;padding:20px}
#conf-ov.on{display:flex}
.conf-box{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rr);padding:20px;width:100%;max-width:300px}
.conf-title{font-family:'Syne',sans-serif;font-size:.9rem;font-weight:700;margin-bottom:7px}
.conf-msg{font-size:.78rem;color:var(--tx2);margin-bottom:16px;line-height:1.5}
.conf-btns{display:flex;gap:8px}
.conf-btn{flex:1;padding:10px;border:none;border-radius:var(--rs);font-family:'Nunito',sans-serif;font-size:.83rem;font-weight:700;cursor:pointer}

/* LAB */
.lab-row{display:flex;align-items:center;gap:8px;font-size:.74rem;padding:4px 0;border-bottom:1px solid var(--bd)}
.lab-row:last-child{border-bottom:none}
.lab-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.lab-name{flex:1;color:var(--tx2)}
.lab-val{font-weight:700}
.lab-st{font-size:.62rem;padding:1px 6px;border-radius:8px;font-weight:600}
.lab-st.ok{background:var(--g2);color:var(--g)}.lab-st.warn{background:var(--o2);color:var(--o)}.lab-st.bad{background:var(--r2);color:var(--r)}
.lab-alert{border-radius:var(--rs);padding:8px 12px;margin-top:8px;font-size:.75rem;font-weight:600;display:flex;align-items:center;gap:6px}
.lab-alert.ok{background:var(--g2);color:var(--g);border:1px solid rgba(74,222,128,.2)}
.lab-alert.warn{background:var(--o2);color:var(--o);border:1px solid rgba(255,179,71,.2)}
.lab-alert.bad{background:var(--r2);color:var(--r);border:1px solid rgba(255,107,138,.2)}

/* PROGRESS RING */
.ring-wrap{position:relative;width:80px;height:80px;flex-shrink:0}
.ring-svg{transform:rotate(-90deg);width:80px;height:80px}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}

/* TIMELINE */
.tl-date-hd{padding:10px 14px 4px;font-family:'Syne',sans-serif;font-size:.72rem;font-weight:700;color:var(--tx3);text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
.tl-date-hd::after{content:'';flex:1;height:1px;background:var(--bd)}
.tl-item{margin:0 14px 8px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rr);padding:10px 12px;display:flex;gap:10px;position:relative;overflow:hidden}
.tl-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--cc,var(--t));border-radius:3px 0 0 3px}
.tl-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;flex-shrink:0;margin-top:1px}
.tl-body{flex:1;min-width:0}
.tl-title{font-size:.82rem;font-weight:700;line-height:1.2}
.tl-detail{font-size:.68rem;color:var(--tx2);margin-top:2px}
.tl-time{font-size:.62rem;color:var(--tx3);margin-top:3px}

/* RESUME */
.res-cat{background:var(--sf);border:1px solid var(--bd);border-radius:var(--rr);margin:0 14px 9px;overflow:hidden}
.res-cat-hd{padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:background .15s}
.res-cat-hd:hover{background:rgba(255,255,255,.02)}
.res-cat-hd .icon{font-size:1.1rem;margin-right:8px}
.res-cat-hd .name{font-family:'Syne',sans-serif;font-size:.82rem;font-weight:700;flex:1}
.res-cat-hd .count{font-size:.68rem;color:var(--tx2);margin-right:8px}
.res-cat-hd .arr{font-size:.7rem;color:var(--tx3);transition:transform .2s}
.res-cat-hd.open .arr{transform:rotate(90deg)}
.res-cat-body{display:none;border-top:1px solid var(--bd);padding:0 0 4px}
.res-cat-body.open{display:block}

/* PROFILE */
.prof-hero{background:linear-gradient(135deg,var(--sf),var(--sf2));border-radius:var(--rr);border:1px solid var(--bd);padding:20px 16px;text-align:center;margin:8px 14px 12px}
.prof-av{width:64px;height:64px;border-radius:50%;margin:0 auto 10px;display:flex;align-items:center;justify-content:center;font-family:'Syne',sans-serif;font-size:1.6rem;font-weight:800;border:3px solid}
.prof-name{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800}
.prof-sub{font-size:.72rem;color:var(--tx2);margin-top:3px;line-height:1.6}

/* SETTINGS ROW */
.srow{display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border-bottom:1px solid var(--bd);cursor:pointer;transition:background .15s}
.srow:hover{background:rgba(255,255,255,.02)}
.srow:last-child{border-bottom:none}
.srow .slabel{font-size:.82rem;font-weight:600}
.srow .sval{font-size:.72rem;color:var(--tx2)}
.srow .sarr{color:var(--tx3);font-size:.8rem}

/* PREGNANCY BANNER */
.preg-banner{border-radius:var(--rr);border:1px solid;padding:12px 14px;margin:0 14px 10px}
.preg-wk{font-family:'Syne',sans-serif;font-size:2.2rem;font-weight:800;line-height:1}

/* VACCINE */
.vax-row{display:flex;align-items:center;gap:10px;padding:9px 14px;border-bottom:1px solid var(--bd)}
.vax-row:last-child{border-bottom:none}
.vax-chk{width:22px;height:22px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.65rem;flex-shrink:0;cursor:pointer;transition:all .2s}
.vax-chk.done{background:var(--t);border-color:var(--t);color:#05081A}
.vax-chk.due{border-color:var(--o);color:var(--o)}

/* DEV */
.dev-row{display:flex;align-items:flex-start;gap:10px;padding:8px 14px;border-bottom:1px solid var(--bd)}
.dev-row:last-child{border-bottom:none}
.dev-chk{width:20px;height:20px;border-radius:50%;border:2px solid var(--bd);display:flex;align-items:center;justify-content:center;font-size:.6rem;flex-shrink:0;cursor:pointer;transition:all .2s;margin-top:1px}
.dev-chk.done{background:var(--g);border-color:var(--g);color:#05081A}

/* SYNC */
.sync-bar{display:flex;align-items:center;gap:10px;padding:10px 12px;background:var(--bg2);border-radius:var(--rs);margin-bottom:12px;font-size:.76rem}
.sync-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sync-dot.ok{background:var(--g)}.sync-dot.err{background:var(--r)}.sync-dot.loading{background:var(--o);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* KMS CHART */
.kms-legend{display:flex;gap:10px;flex-wrap:wrap;padding:4px 14px 8px}
.kms-leg{display:flex;align-items:center;gap:4px;font-size:.62rem;color:var(--tx2)}
.kms-dot{width:7px;height:7px;border-radius:50%}

/* EMPTY */
.empty{text-align:center;padding:28px 0;color:var(--tx2)}
.empty .ei{font-size:2rem;margin-bottom:6px;opacity:.35}
.empty p{font-size:.76rem}

/* IMPORT */
.imp-zone{border:2px dashed var(--bd);border-radius:var(--rr);padding:22px;text-align:center;cursor:pointer;transition:all .2s;margin-bottom:10px}
.imp-zone:hover,.imp-zone:active{border-color:var(--t);background:var(--t2)}
.imp-zone .iz{font-size:1.8rem;margin-bottom:6px}
.imp-zone p{font-size:.76rem;color:var(--tx2)}
.imp-zone .iz2{font-size:.65rem;color:var(--tx3);margin-top:3px}

/* BMI */
.bmi-track{height:7px;background:linear-gradient(90deg,var(--b) 0%,var(--g) 22%,var(--o) 55%,var(--r) 75%,var(--p) 100%);border-radius:4px;position:relative;margin:8px 0 4px}
.bmi-needle{position:absolute;top:-3px;width:13px;height:13px;background:white;border-radius:50%;border:2px solid var(--bg);transform:translateX(-50%);transition:left .8s ease}

/* CHRONIC */
.chr-card{display:flex;align-items:center;gap:10px;padding:10px 14px;border-bottom:1px solid var(--bd)}
.chr-card:last-child{border-bottom:none}

/* SPINNER */
.spin{display:inline-block;width:14px;height:14px;border:2px solid var(--bd);border-top-color:var(--t);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}

/* SET ROW */
.set-irow{display:grid;grid-template-columns:auto 1fr 1fr;gap:6px;align-items:center;padding:4px 0;border-bottom:1px solid var(--bd)}
.set-irow:last-child{border-bottom:none}
.set-num{font-size:.72rem;color:var(--tx2);font-weight:700;width:24px}

/* DOC CARD */
.doc-card{display:flex;gap:12px;padding:12px 14px;border-bottom:1px solid var(--bd)}
.doc-card:last-child{border-bottom:none}
.doc-av{width:40px;height:40px;border-radius:10px;background:var(--b2);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0}

/* CYCLE CAL */
.cyc-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;padding:8px 14px 4px}
.cyc-day{aspect-ratio:1;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.6rem;font-weight:600;color:var(--tx3)}
.cyc-day.period{background:var(--r2);color:var(--r)}
.cyc-day.fertile{background:var(--t2);color:var(--t)}
.cyc-day.ovulation{background:var(--t);color:#05081A;font-weight:800}
.cyc-day.today{border:1.5px solid var(--tx2);color:var(--tx)}

/* JRNL */
.jrnl-card{margin:0 14px 9px;background:var(--sf);border:1px solid var(--bd);border-radius:var(--rr);padding:12px 14px}

/* SEARCH */
.search-wrap{padding:8px 14px 4px;position:relative}
.search-input{background:var(--sf);border:1.5px solid var(--bd);border-radius:24px;padding:9px 14px 9px 36px;color:var(--tx);font-size:.82rem;font-family:'Nunito',sans-serif;width:100%;outline:none;transition:border-color .2s}
.search-input:focus{border-color:var(--t)}
.search-icon{position:absolute;left:25px;top:50%;transform:translateY(-50%);font-size:.85rem;pointer-events:none;color:var(--tx3)}
.search-clear{position:absolute;right:25px;top:50%;transform:translateY(-50%);background:var(--tx3);border:none;border-radius:50%;width:16px;height:16px;color:var(--bg);font-size:.6rem;cursor:pointer;display:none;align-items:center;justify-content:center;line-height:1}

function getProfiles(){return JSON.parse(localStorage.getItem(PK)||'[]')}
function saveProfiles(p){localStorage.setItem(PK,JSON.stringify(p))}
function getData(){return JSON.parse(localStorage.getItem(DK)||'{}')}

function getP(){return getProfiles()[cPid]||{}}
function getPid(){return getP().id}
function getGender(){return getP().gender||'M'}
function isFemale(){return getGender()==='F'}

// Section data — always uses CURRENT profile id at call time
function getSec(sec){
  const pid=getPid();
  if(!pid) return[];
  const d=getData();
  return d[pid]?.[sec]||[];
}
function addItem(sec,item){
  const pid=getPid(); if(!pid) return;
  const d=getData();
  if(!d[pid]) d[pid]={};
  if(!d[pid][sec]) d[pid][sec]=[];
  const it={...item,id:Date.now()+(Math.random()*999|0),date:item.date||today()};
  d[pid][sec].unshift(it);
  saveData(d);
  return it.id;
}
function updItem(sec,id,item){
  const pid=getPid(); if(!pid) return;
  const d=getData();
  const arr=d[pid]?.[sec];
  if(!arr) return;
  const i=arr.findIndex(x=>x.id===id);
  if(i!==-1) arr[i]={...item,id};
  saveData(d);
}
function delItem(sec,id){
  const pid=getPid(); if(!pid) return;
  const d=getData();
  if(d[pid]?.[sec]) d[pid][sec]=d[pid][sec].filter(x=>x.id!==id);
  saveData(d);
}
function dupItem(sec,id){
  const item=getSec(sec).find(x=>x.id===id);
  if(!item){toast('Data tidak ditemukan');return;}
  addItem(sec,{...item,id:undefined,date:today()});
  toast('📋 Diduplikasi!'); renderCurrent();
}

function today(){return new Date().toISOString().split('T')[0]}
function fmtD(d){if(!d)return'';try{return new Date(d).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'})}catch{return d}}
function diffDays(a,b=new Date()){const x=new Date(a);return Math.max(0,Math.floor((b-x)/86400000))}
function ageD(dob){return dob?diffDays(dob):0}
function ageM(dob){return dob?Math.floor(ageD(dob)/30.44):0}
function ageY(dob){return dob?Math.floor(ageD(dob)/365.25):0}
function isDev(){const p=getP();return p.dob&&ageD(p.dob)<=1000}
function addDaysStr(s,n){const d=new Date(s);d.setDate(d.getDate()+n);return d.toISOString().split('T')[0]}
function nowTime(){return new Date().toTimeString().slice(0,5)}

let _tt;
function toast(m){
  const t=document.getElementById('toast');

function renderDashBanners(){
  let html='';
  const p=getP();
  if(isFemale()){
    const cycles=getSec('cycle');
    const preg=cycles.find(c=>c.type==='pregnancy'&&c.active);
    if(preg){
      const wk=Math.floor(diffDays(preg.lmp)/7);
      const tri=wk<13?'Trimester 1':wk<27?'Trimester 2':'Trimester 3';
      const hpl=addDaysStr(preg.lmp,280);
      html+=`<div class="preg-banner" style="border-color:var(--pk);background:var(--pk2)">
        <div style="font-family:'Syne',sans-serif;font-size:.8rem;font-weight:700;color:var(--pk);margin-bottom:6px">🤰 Kehamilan Aktif — ${tri}</div>
        <div style="display:flex;align-items:center;gap:14px">
          <div><div class="preg-wk" style="color:var(--pk)">${wk}</div><div style="font-size:.62rem;color:var(--tx2)">minggu</div></div>
          <div style="font-size:.72rem;color:var(--tx2);line-height:1.7">HPL: ${fmtD(hpl)}<br>${getPregTips(wk)}</div>
        </div></div>`;
    }
    const mens=cycles.find(c=>c.type==='period'&&c.active);
    if(mens){
      const day=diffDays(mens.startDate)+1;
      html+=`<div class="preg-banner" style="border-color:var(--r);background:var(--r2)">
        <div style="font-size:.8rem;font-weight:700;color:var(--r)">🩸 Menstruasi Hari ke-${day}</div>
        <div style="font-size:.7rem;color:var(--tx2);margin-top:3px">Istirahat cukup · Kompres hangat untuk kram · Minum air lebih banyak</div>
      </div>`;
    }
    // Nursing banner
    const nursing=getSec('nursing');
    const activeNurse=nursing.find(n=>n.active);
    if(activeNurse){
      const elapsed=activeNurse.startTime?Math.floor((Date.now()-new Date(activeNurse.date+'T'+activeNurse.startTime))/60000):0;
      html+=`<div class="nursing-banner">
        <div style="font-size:.8rem;font-weight:700;color:var(--b);margin-bottom:4px">🤱 Sesi Menyusui Aktif</div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <div style="font-size:.72rem;color:var(--tx2)">Sisi: ${activeNurse.side==='left'?'Kiri':activeNurse.side==='right'?'Kanan':'Keduanya'} · Dimulai ${activeNurse.startTime||''}</div>
          <button onclick="endNursing(${activeNurse.id})" style="padding:5px 12px;background:var(--b);border:none;border-radius:20px;color:#05081A;font-size:.7rem;font-weight:700;cursor:pointer">Selesai</button>
        </div>
      </div>`;
    }
  } else {
    // Partner info for husband
    const ps=getProfiles();const allD=getData();
    ps.forEach(fp=>{
      if(fp.gender!=='F') return;
      const cyc=allD[fp.id]?.cycle||[];
      const preg=cyc.find(c=>c.type==='pregnancy'&&c.active);
      if(preg){
        const wk=Math.floor(diffDays(preg.lmp)/7);
        html+=`<div class="preg-banner" style="border-color:var(--b);background:var(--b2)">
          <div style="font-size:.8rem;font-weight:700;color:var(--b);margin-bottom:4px">💙 ${fp.name} sedang hamil ${wk} minggu</div>
          <div style="font-size:.7rem;color:var(--tx2)">${getPartnerTips(wk)}</div>
        </div>`;
      }
    });
  }
  // Fasting banner for any profile
  const fastings=getSec('fasting');
  const activeFast=fastings.find(f=>f.active&&!f.completed);
  if(activeFast){
    const startDt=activeFast.date&&activeFast.startTime?new Date(activeFast.date+'T'+activeFast.startTime):null;
    const elapsed=startDt?Math.floor((Date.now()-startDt)/3600000):0;
    html+=`<div class="preg-banner" style="border-color:var(--y);background:var(--y2);margin:0 14px 10px">
      <div style="font-size:.8rem;font-weight:700;color:var(--y);margin-bottom:4px">🌙 Sedang Berpuasa</div>
      <div style="display:flex;align-items:center;justify-content:space-between">
        <div>
          <div class="fast-timer">${elapsed}j</div>
          <div style="font-size:.65rem;color:var(--tx2)">${({ramadan:'Puasa Ramadan',sunnah:'Puasa Sunnah',medical:'Puasa Medis',intermittent:'Intermittent Fasting'}[activeFast.fastType]||activeFast.fastType||'Puasa')} · Mulai ${activeFast.startTime||'—'}</div>
        </div>
        <button onclick="completeFast(${activeFast.id})" style="padding:7px 14px;background:var(--y);border:none;border-radius:20px;color:#05081A;font-size:.72rem;font-weight:800;cursor:pointer">🍴 Buka</button>
      </div>
    </div>`;
  }
  document.getElementById('dash-banners').innerHTML=html?`<div style="margin:6px 0">${html}</div>`:'';
}

function getPregTips(w){
  if(w<13)return'Konsumsi asam folat · Hindari kafein berlebih';
  if(w<28)return'Senam hamil · Kontrol rutin ke dokter';
  return'Siapkan perlengkapan bayi · Kenali tanda persalinan';
}
function getPartnerTips(w){
  if(w<13)return'Bantu istirahat · Temani kontrol kehamilan · Dukung perubahan suasana hati';
  if(w<28)return'Temani senam hamil · Siapkan makanan bergizi · Ajak bicara pada janin';
  return'Siapkan tas RS · Pelajari tanda persalinan · Selalu siap dihubungi';
}

function ringHTML(val,max,color,mainLbl,subLbl){
  const pct=Math.min(val/max,1);const r=28;const circ=2*Math.PI*r;
  return`<div class="ring-wrap"><svg class="ring-svg" viewBox="0 0 72 72" width="72" height="72">
    <circle cx="36" cy="36" r="${r}" fill="none" stroke="rgba(255,255,255,.06)" stroke-width="7"/>
    <circle cx="36" cy="36" r="${r}" fill="none" stroke="${color}" stroke-width="7" stroke-linecap="round"
      stroke-dasharray="${circ}" stroke-dashoffset="${circ-(pct*circ)}"/>
  </svg><div class="ring-center">
    <div style="font-family:'Syne',sans-serif;font-size:.8rem;font-weight:800;color:${color}">${mainLbl}</div>
    <div style="font-size:.52rem;color:var(--tx2)">${subLbl}</div>
  </div></div>`;
}

  jFilt=f;
  document.querySelectorAll('#jfilt-pills .pill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  renderJournal();
}

function renderJournal(){
  let items=collectAllItems(365,jFilt);

  // Apply text search
  if(jSearch){
    items=items.filter(it=>{
      const text=Object.values(it).filter(v=>typeof v==='string').join(' ').toLowerCase();
      return text.includes(jSearch);
    });
    const cnt=document.getElementById('j-search-count');
    if(cnt) cnt.textContent=items.length?`${items.length} hasil ditemukan`:'Tidak ada hasil';
  } else {
    const cnt=document.getElementById('j-search-count');
    if(cnt) cnt.textContent='';
  }

  if(!items.length){
    document.getElementById('journal-list').innerHTML=`<div class="empty"><div class="ei">${jSearch?'🔍':'📖'}</div><p>${jSearch?`Tidak ada hasil untuk "<b>${jSearch}</b>"`:'Belum ada data'}</p></div>`;
    return;
  }
  // Group by date
  const byDate={};
  items.forEach(it=>{
    const d=it.date||today();
    if(!byDate[d]) byDate[d]=[];
    byDate[d].push(it);
  });
  const dates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  let html='';
  dates.forEach(d=>{
    html+=`<div class="tl-date-hd">${fmtD(d)}</div>`;
    byDate[d].forEach(it=>{ html+=tlItemHTML(it,jSearch); });
  });
  document.getElementById('journal-list').innerHTML=html;
}

// Collect all items from all sections for the current profile
function collectAllItems(daysBack=365,secFilter='all'){
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-daysBack);
  const secs=['vitals','activity','lab','body','symptoms','nutrition','medication','sleep','lifestyle','fasting','nursing','cycle','hosp','journal','doctors','clinical'];
  let all=[];
  secs.forEach(sec=>{
    if(secFilter!=='all'&&secFilter!==sec) return;
    const items=getSec(sec);
    items.forEach(it=>{
      if(it.date&&new Date(it.date)<cutoff) return;
      all.push({...it,_sec:sec});
    });
  });
  all.sort((a,b)=>(b.date||'').localeCompare(a.date||''));
  return all;
}

function highlight(text,q){
  if(!q||!text) return text||'';
  const re=new RegExp('('+q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+')','gi');
  return String(text).replace(re,'<mark style="background:rgba(0,223,196,.3);color:var(--t);border-radius:3px;padding:0 2px">$1</mark>');
}

function tlItemHTML(it,q=''){
  const sec=it._sec;
  const meta=SEC_META[sec]||{icon:'📝',color:'var(--t)',title:s=>s._sec};
  const color=meta.color;
  const title=highlight(meta.title(it),q);
  const detail=highlight(meta.detail?meta.detail(it):'',q);
  const tags=meta.tags?meta.tags(it):[];
  return`<div class="tl-item" style="--cc:${color}">
    <div class="tl-icon" style="background:${color}18">${meta.icon}</div>
    <div class="tl-body">
      <div class="tl-title">${title}</div>
      ${detail?`<div class="tl-detail">${detail}</div>`:''}
      ${tags.length?`<div class="tags" style="margin-top:4px">${tags.map(t=>`<span class="tag" style="background:${color}15;color:${color}">${highlight(t,q)}</span>`).join('')}</div>`:''}
      <div class="tl-time">${fmtD(it.date)}${it.time?' · '+it.time:''}</div>
    </div>
    <div class="cbtns" style="flex-direction:column">
      <button class="cbtn" onclick="openM('edit_${sec}',${it.id})">✏️</button>
      <button class="cbtn" onclick="dupItem('${sec}',${it.id})">⧉</button>
      <button class="cbtn del" onclick="cDel('${sec}',${it.id})">✕</button>
    </div>
  </div>`;
}

// Toggle open/close resume categories
function toggleResCat(id){
  const hd=document.querySelector(`#rc-${id} .res-cat-hd`);

function resumeCycle(){
  const data=getSec('cycle');const now=new Date();
  const dIM=new Date(now.getFullYear(),now.getMonth()+1,0).getDate();
  const periods=data.filter(d=>d.type==='period');
  const pDays=new Set();
  periods.forEach(p=>{if(p.startDate&&p.endDate){let d=new Date(p.startDate);const e=new Date(p.endDate);while(d<=e){if(d.getMonth()===now.getMonth())pDays.add(d.getDate());d.setDate(d.getDate()+1);}}}); 
  const cycLens=data.filter(d=>d.cycleLength).map(d=>+d.cycleLength);
  const avgCyc=cycLens.length?Math.round(cycLens.reduce((a,b)=>a+b,0)/cycLens.length):28;
  const lastP=periods[0];
  let ovDay=null;
  if(lastP?.startDate){const od=new Date(lastP.startDate);od.setDate(od.getDate()+avgCyc-14);if(od.getMonth()===now.getMonth())ovDay=od.getDate();}
  const fDow=(new Date(now.getFullYear(),now.getMonth(),1).getDay()+6)%7;
  let cal=['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>`<div style="text-align:center;font-size:.56rem;color:var(--tx3);font-weight:700;padding:2px">${d}</div>`).join('');
  for(let i=0;i<fDow;i++) cal+=`<div></div>`;
  for(let day=1;day<=dIM;day++){
    const iT=day===now.getDate(),iP=pDays.has(day),iO=day===ovDay,iF=ovDay&&day>=ovDay-5&&day<=ovDay+1&&!iO;
    const cls=iP?'period':iO?'ovulation':iF?'fertile':iT?'today':'';
    cal+=`<div class="cyc-day ${cls}">${day}</div>`;
  }
  return`<div style="padding:8px 0 0;border-bottom:1px solid var(--bd)">
    <div class="cyc-grid">${cal}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;padding:4px 14px 10px;font-size:.63rem">
      <span class="tag r">🩸 Haid</span><span class="tag t">🌿 Subur</span>
      <span style="padding:3px 8px;border-radius:20px;background:var(--t);color:#05081A;font-size:.63rem;font-weight:600">💚 Ovulasi</span>
    </div>
  </div>`+
  addBtn('add_cycle','+ Catat Siklus / Gejala / Kehamilan')+
  (data.length?data.slice(0,15).map(d=>itemCard('cycle',d,'var(--pk)',
    ({period:'Menstruasi',symptom:'Gejala PMS',basal:'Suhu Basal',pregnancy:'Kehamilan'}[d.type]||'Siklus')+' · '+fmtD(d.date),
    [d.startDate&&`Mulai ${fmtD(d.startDate)}`,d.endDate&&`Selesai ${fmtD(d.endDate)}`,d.cycleLength&&`${d.cycleLength} hari`,d.basalTemp&&`${d.basalTemp}°C`].filter(Boolean).join(' · '),
    d.active?`<span class="tag pk">Aktif</span>`:''
  )).join(''):emptySmall('Belum ada data siklus'));
}

function resumeFasting(){
  const data=getSec('fasting');const td=today();
  const todData=data.filter(d=>d.date===td);
  const active=data.find(d=>d.active&&!d.completed);
  const totalFasts=data.filter(d=>d.completed).length;
  const thisMonth=data.filter(d=>d.date&&d.date.slice(0,7)===td.slice(0,7)&&d.completed).length;
  const avgDur=data.filter(d=>d.duration).length?Math.round(data.filter(d=>d.duration).reduce((s,d)=>s+(+d.duration||0),0)/data.filter(d=>d.duration).length):0;

  // Active fast timer
  let timerHTML='';
  if(active&&active.startTime){

function completeFast(id){

  if(item){

    item.endTime=new Date().toTimeString().slice(0,5);

function kmsChartHTML(who,bodyData,field,label,ageMo){
  const P=getP();
  const pts=bodyData.filter(d=>d[field]).map(d=>{const m=P.dob?Math.round(diffDays(P.dob,new Date(d.date))/30.44):0;return{x:m,y:+d[field]};});
  const W=280,H=90,pL=28,pB=18,pT=8;
  const maxA=Math.max(36,...pts.map(p=>p.x));
  const allV=[...who.flatMap(r=>[r[1],r[2],r[3]]),...pts.map(p=>p.y)];
  const minV=Math.min(...allV)-1,maxV=Math.max(...allV)+1;
  const xs=x=>(W-pL)*x/Math.max(maxA,36)+pL,ys=y=>H-pB-(y-minV)/(maxV-minV)*(H-pB-pT);
  const topPts=who.map(r=>`${xs(r[0]).toFixed(1)},${ys(r[3]).toFixed(1)}`).join(' ');
  const botPts=[...who].reverse().map(r=>`${xs(r[0]).toFixed(1)},${ys(r[2]).toFixed(1)}`).join(' ');
  const yLbls=[];for(let v=Math.ceil(minV);v<=maxV;v+=Math.ceil((maxV-minV)/3)){yLbls.push(`<text x="2" y="${ys(v).toFixed(0)}" font-size="6" fill="var(--tx2)" dominant-baseline="middle">${v}</text>`);}
  return`<svg viewBox="0 0 ${W} ${H+8}" style="width:100%;height:auto;overflow:visible">
    <polygon points="${topPts} ${botPts}" fill="rgba(0,223,196,.06)"/>
    <polyline points="${who.map(r=>`${xs(r[0]).toFixed(1)},${ys(r[2]).toFixed(1)}`).join(' ')}" fill="none" stroke="var(--r)" stroke-width="1" stroke-dasharray="3,2"/>
    <polyline points="${who.map(r=>`${xs(r[0]).toFixed(1)},${ys(r[1]).toFixed(1)}`).join(' ')}" fill="none" stroke="var(--g)" stroke-width="1.5"/>
    <polyline points="${who.map(r=>`${xs(r[0]).toFixed(1)},${ys(r[3]).toFixed(1)}`).join(' ')}" fill="none" stroke="var(--r)" stroke-width="1" stroke-dasharray="3,2"/>
    ${pts.length>=2?`<polyline points="${pts.map(p=>`${xs(p.x).toFixed(1)},${ys(p.y).toFixed(1)}`).join(' ')}" fill="none" stroke="white" stroke-width="2"/>`:''}
    ${pts.map(p=>`<circle cx="${xs(p.x).toFixed(1)}" cy="${ys(p.y).toFixed(1)}" r="3" fill="white" stroke="var(--bg)" stroke-width="1.5"/>`).join('')}
    ${yLbls.join('')}
    ${[0,6,12,18,24,36].filter(x=>x<=maxA).map(x=>`<text x="${xs(x).toFixed(0)}" y="${H+6}" font-size="6" fill="var(--tx3)" text-anchor="middle">${x}bln</text>`).join('')}
    <text x="${pL+2}" y="${pT+8}" font-size="6.5" fill="var(--tx2)">${label}</text>
  </svg>`;
}

function getLabItems(d){
  const items=[];const g=getGender();
  ['cholTotal','cholLDL','cholHDL','triglycerides','glucFasting','glucRandom','hba1c','uricAcid','sgpt','sgot','gammaGT','alp','creatinine','ureum','hemoglobin','hematocrit','wbc','platelet','neutrophil','lymphocyte','tsh','t4'].forEach(k=>{
    if(d[k]==null||d[k]==='') return;
    const ref=LAB_REF[k];if(!ref) return;
    const v=parseFloat(d[k]);let c='',l='';
    if(ref.genderRef){const r=ref.genderRef[g]||ref.genderRef['M'];c=v<r[0]||v>r[1]?'bad':'ok';l=v<r[0]?'Rendah':v>r[1]?'Tinggi':'Normal';}
    else if(ref.ranges){for(const r of ref.ranges){if(v<=r.max){c=r.c;l=r.l;break;}}}
    items.push({k,n:ref.n,v:d[k],u:ref.u,c,l});
  });
  return items;
}

function lineTrendSVG(data,field,label,norm,high){
  const pts=data.slice(0,8).reverse().filter(d=>d[field]).map(d=>({x:d.date?.slice(5),y:+d[field]}));
  if(pts.length<2) return'';
  const W=260,H=60,pL=28,pB=18,pT=8;
  const vs=pts.map(p=>p.y);const minV=Math.min(...vs,norm-30),maxV=Math.max(...vs,high+30);
  const xs=(W-pL)/(pts.length-1),ys=(H-pB-pT)/(maxV-minV);
  const pp=pts.map((p,i)=>({x:pL+i*xs,y:H-pB-(p.y-minV)*ys}));
  const path=pp.map((p,i)=>(i?'L':'M')+p.x.toFixed(1)+' '+p.y.toFixed(1)).join(' ');
  const nY=H-pB-(norm-minV)*ys,hY=H-pB-(high-minV)*ys;
  return`<div style="margin-top:8px"><svg viewBox="0 0 ${W} ${H+6}" style="width:100%;height:auto">
    <line x1="${pL}" x2="${W}" y1="${nY.toFixed(1)}" y2="${nY.toFixed(1)}" stroke="var(--g)" stroke-width="0.8" stroke-dasharray="3,2"/>
    <line x1="${pL}" x2="${W}" y1="${hY.toFixed(1)}" y2="${hY.toFixed(1)}" stroke="var(--r)" stroke-width="0.8" stroke-dasharray="3,2"/>
    <path d="${path}" stroke="var(--t)" stroke-width="2" fill="none"/>
    ${pp.map(p=>`<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.5" fill="var(--t)"/>`).join('')}
    ${pts.map((p,i)=>`<text x="${(pL+i*xs).toFixed(0)}" y="${H+5}" font-size="5.5" fill="var(--tx3)" text-anchor="middle">${p.x}</text>`).join('')}
    <text x="${pL+2}" y="${pT+7}" font-size="5.5" fill="var(--tx2)">${label}</text>
  </svg></div>`;
}

    add_lab:{title:'🔬 Hasil Lab',body:`

        <button class="mtab" type="button" onclick="switchLabTab('liver',this)">Hati/Ginjal</button>

        <div class="fg"><label>LDL (mg/dL)</label><input type="number" id="f-cholLDL" placeholder="—"></div></div>
        <div class="fr"><div class="fg"><label>HDL (mg/dL)</label><input type="number" id="f-cholHDL" placeholder="—"></div>
        <div class="fg"><label>Trigliserida (mg/dL)</label><input type="number" id="f-triglycerides" placeholder="—"></div></div>
      </div>
      <div id="lab-tab-glucose" style="display:none">
        <div class="fr"><div class="fg"><label>Gula Puasa (mg/dL)</label><input type="number" id="f-glucFasting" placeholder="—"></div>
        <div class="fg"><label>Gula Sewaktu (mg/dL)</label><input type="number" id="f-glucRandom" placeholder="—"></div></div>
        <div class="fg"><label>HbA1c (%)</label><input type="number" id="f-hba1c" step="0.1" placeholder="—"></div>
      </div>

        <div class="fr"><div class="fg"><label>SGPT/ALT (U/L)</label><input type="number" id="f-sgpt" placeholder="—"></div>
        <div class="fg"><label>SGOT/AST (U/L)</label><input type="number" id="f-sgot" placeholder="—"></div></div>
        <div class="fr"><div class="fg"><label>Gamma-GT (U/L)</label><input type="number" id="f-gammaGT" placeholder="—"></div>
        <div class="fg"><label>ALP (U/L)</label><input type="number" id="f-alp" placeholder="—"></div></div>

        <div class="fg"><label>Ureum (mg/dL)</label><input type="number" id="f-ureum" placeholder="—"></div></div>
        <div class="fg"><label>Asam Urat (mg/dL)</label><input type="number" id="f-uricAcid" step="0.1" placeholder="—"></div>
      </div>
      <div id="lab-tab-cbc" style="display:none">
        <div class="fr"><div class="fg"><label>Hemoglobin (g/dL)</label><input type="number" id="f-hemoglobin" step="0.1" placeholder="—"></div>
        <div class="fg"><label>Hematokrit (%)</label><input type="number" id="f-hematocrit" placeholder="—"></div></div>
        <div class="fr"><div class="fg"><label>Leukosit/WBC (10³/µL)</label><input type="number" id="f-wbc" step="0.1" placeholder="—"></div>
        <div class="fg"><label>Trombosit (10³/µL)</label><input type="number" id="f-platelet" placeholder="—"></div></div>
        <div class="fr"><div class="fg"><label>Neutrofil (%)</label><input type="number" id="f-neutrophil" placeholder="—"></div>
        <div class="fg"><label>Limfosit (%)</label><input type="number" id="f-lymphocyte" placeholder="—"></div></div>
      </div>
      <div id="lab-tab-thyroid" style="display:none">
        <div class="fr"><div class="fg"><label>TSH (mIU/L)</label><input type="number" id="f-tsh" step="0.01" placeholder="—"></div>
        <div class="fg"><label>T4 Bebas (ng/dL)</label><input type="number" id="f-t4" step="0.01" placeholder="—"></div></div>
      </div>

          <div id="f-custom-tests"></div>

        </div>
      </div>
      <div class="fg"><label>Catatan / Interpretasi</label><textarea id="f-notes" placeholder="Catatan dokter..."></textarea></div>`},
    add_symptom:{title:'🤒 Gejala / Kondisi / Cedera',body:`

        <div><div style="font-weight:700;font-size:.8rem">Google Apps Script</div>

      <div id="sync-log" style="font-size:.72rem;color:var(--tx2);margin-top:8px;min-height:20px"></div>`},

async function gasPost(url, payload){
  // Use text/plain to avoid CORS preflight on Google Apps Script
  const r=await fetch(url,{
    method:'POST',
    redirect:'follow',
    headers:{'Content-Type':'text/plain;charset=utf-8'},
    body:JSON.stringify(payload)
  });
  if(!r.ok) throw new Error('HTTP '+r.status);
  const txt=await r.text();
  try{return JSON.parse(txt);}catch{return{ok:true};}
}
async function gasGet(url, params={}){
  const qs=Object.entries(params).map(([k,v])=>k+'='+encodeURIComponent(v)).join('&');
  const r=await fetch(url+(qs?'?'+qs:''),{redirect:'follow'});
  if(!r.ok) throw new Error('HTTP '+r.status);
  const txt=await r.text();
  try{return JSON.parse(txt);}catch{throw new Error('Response bukan JSON');}
}
async function doSync(){
  const inp=document.getElementById('f-gasUrl');
  const url=(inp?.value?.trim())||getSett().gasUrl;
  if(!url){toast('URL Apps Script belum diisi');return;}
  const s=getSett();s.gasUrl=url;saveSett(s);
  setSync('loading','Mengirim...');syncLog('⏳ Mengirim data...');
  try{
    const res=await gasPost(url,{action:'push',profiles:getProfiles(),data:getData(),ts:new Date().toISOString()});
    s.lastSync=new Date().toISOString();saveSett(s);
    setSync('ok','Sinkron: '+fmtD(s.lastSync));
    syncLog('✅ '+(res.message||'Data terkirim ke Sheets'));toast('✅ Data terkirim!');
  }catch(e){setSync('err','Gagal');syncLog('❌ '+e.message+' — Pastikan URL benar dan akses Web App: Anyone');toast('❌ Gagal: '+e.message);}
}
async function doPull(){
  const inp=document.getElementById('f-gasUrl');
  const url=(inp?.value?.trim())||getSett().gasUrl;
  if(!url){toast('URL belum diisi');return;}
  const s=getSett();s.gasUrl=url;saveSett(s);
  setSync('loading','Mengambil...');syncLog('⏳ Mengambil data...');
  try{
    const rd=await gasGet(url,{action:'pull',ts:Date.now()});
    if(rd.data) saveData({...getData(),...rd.data});
    if(rd.profiles) saveProfiles(rd.profiles);
    s.lastSync=new Date().toISOString();saveSett(s);
    setSync('ok','Sinkron: '+fmtD(s.lastSync));
    syncLog('✅ Data ditarik dari Sheets');toast('✅ Data diperbarui!');
    renderProfiles();renderCurrent();
  }catch(e){setSync('err','Gagal');syncLog('❌ '+e.message);toast('❌ Gagal: '+e.message);}
}
function setSync(status,text){
  const dot=document.querySelector('#sync-bar .sync-dot');const lbl=document.getElementById('sync-last');
  if(dot){dot.className='sync-dot '+status;}if(lbl)lbl.textContent=text;
}

function importCSV(input){
  const file=input.files[0];if(!file) return;
  const reader=new FileReader();
  reader.onload=e=>{
    const lines=e.target.result.trim().split('\n');
    const headers=lines[0].split(',').map(h=>h.trim().toLowerCase().replace(/["\s]/g,''));
    const type=document.getElementById('f-csv-type')?.value||'vitals';
    let n=0;
    lines.slice(1).forEach(line=>{
      const cols=line.split(',').map(c=>c.trim().replace(/"/g,''));
      if(!cols.filter(Boolean).length) return;
      const obj={};headers.forEach((h,i)=>{if(cols[i]!==undefined)obj[h]=cols[i];});
      addItem(type,{...obj,date:obj.date||today()});n++;
    });
    const prev=document.getElementById('csv-preview');
    if(prev) prev.textContent=`✅ ${n} baris berhasil diimpor sebagai data "${type}"`;
    toast(`✅ ${n} data diimpor!`);renderCurrent();
  };
  reader.readAsText(file);
}

// AUTO-SYNC (every 5 seconds if URL set)
// ─────────────────────────────────────────────
let _syncTimer=null;
let _syncBusy=false;

async function autoSync(){
  if(_syncBusy) return;
  const s=getSett();
  if(!s.gasUrl||!s.autoSync) return;
  _syncBusy=true;
  setIndicator('loading');
  try{
    const r=await fetch(s.gasUrl,{method:'POST',redirect:'follow',
      headers:{'Content-Type':'text/plain;charset=utf-8'},
      body:JSON.stringify({action:'push',profiles:getProfiles(),data:getData(),ts:new Date().toISOString()}),
      signal:AbortSignal.timeout(4500)});
    if(r.ok){
      s.lastSync=new Date().toISOString();saveSett(s);
      setIndicator('ok');
    } else {setIndicator('err');}
  }catch(e){setIndicator('err');}
  finally{_syncBusy=false;}
}

function setIndicator(status){
  const el=document.getElementById('sync-indicator');
  if(!el) return;
  el.style.background=status==='ok'?'var(--g)':status==='err'?'var(--r)':status==='loading'?'var(--o)':'var(--tx3)';
  if(status==='ok') setTimeout(()=>setIndicator('idle'),3000);
}

function startAutoSync(){
  if(_syncTimer) clearInterval(_syncTimer);
  _syncTimer=setInterval(autoSync,5000);
}

function saveNursingWithSync(item,editId){
  // Save nursing record
  if(editId) updItem('nursing',editId,item);
  else addItem('nursing',item);
  // Sync to baby profile nutrition if babyName matches a child profile
  if(item.babyName&&item.duration){
    const ps=getProfiles();
    const baby=ps.find(p=>p.name===item.babyName||(p.role==='Anak'&&p.name.includes(item.babyName)));
    if(baby){
      const d=getData();
      if(!d[baby.id]) d[baby.id]={};
      if(!d[baby.id].nutrition) d[baby.id].nutrition=[];
      // Check if already synced for this date+time
      const exists=d[baby.id].nutrition.find(n=>n._nursingSync&&n.date===item.date&&n.meal===item.startTime);
      if(!exists){
        d[baby.id].nutrition.unshift({
          id:Date.now(),date:item.date||today(),meal:item.startTime||'',
          type:'Menyusui',name:'ASI'+( item.side?(' — '+(item.side==='left'?'Kiri':item.side==='right'?'Kanan':'Keduanya')):''),
          calories:item.method==='pump'&&item.amount?Math.round(+item.amount*0.65):0,
          water:0,protein:0,fat:0,carbs:0,
          notes:`Sesi menyusui ${item.duration} menit`,
          _nursingSync:true
        });
        saveData(d);
      }
    }
  }
}

function exportCSV(secList){
  const p=getP();
  let csv='VITAFAM EXPORT — '+p.name+'\n';
  csv+='Diekspor: '+new Date().toLocaleString('id-ID')+'\n\n';
  secList.forEach(sec=>{
    const data=getSec(sec);
    if(!data.length) return;
    csv+='=== '+sec.toUpperCase()+' ===\n';
    const keys=[...new Set(data.flatMap(d=>Object.keys(d).filter(k=>!k.startsWith('_'))))];
    csv+=keys.join(',')+('\n');
    data.forEach(d=>{
      csv+=keys.map(k=>{
        const v=d[k];
        if(v===null||v===undefined) return '';
        if(typeof v==='object') return JSON.stringify(v).replace(/,/g,';');
        return String(v).replace(/,/g,';');
      }).join(',')+('\n');
    });
    csv+='\n';
  });
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download='vitafam_'+p.name+'_'+today()+'.csv';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('✅ CSV berhasil diekspor!');
}

  w.document.write(html);w.document.close();
  setTimeout(()=>w.print(),400);

}
