<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Keluarga & Kontak Darurat | FamilyHealth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #eef2ff;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --radius-lg: 16px;
            --radius-md: 12px;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); padding-bottom: 6rem; }
        .container { max-width: 800px; margin: 0 auto; padding: 2rem 1.5rem; }

        header { margin-bottom: 2rem; display: flex; align-items: center; gap: 1rem; }
        .back-btn { background: white; border: 1px solid var(--border); padding: 0.5rem; border-radius: 50%; cursor: pointer; color: var(--text-muted); transition: 0.2s; height: 40px; width: 40px; display: flex; align-items: center; justify-content: center; }
        .back-btn:hover { border-color: var(--primary); color: var(--primary); }

        .form-group { margin-bottom: 1.25rem; }
        label { display: block; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; color: var(--text-muted); text-transform: uppercase; }
        input, select, textarea { width: 100%; padding: 0.75rem 1rem; border-radius: var(--radius-md); border: 1px solid var(--border); font-size: 0.95rem; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-light); }

        .btn { padding: 0.75rem 1.25rem; border-radius: var(--radius-md); font-weight: 700; border: none; cursor: pointer; display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem; transition: 0.2s; font-size: 0.85rem; text-decoration: none; }
        .btn-primary { background: var(--primary); color: white; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--primary); color: var(--primary); }
        .btn-secondary { background: var(--primary-light); color: var(--primary); }

        .profile-card, .emergency-card { background: white; padding: 1.25rem; border-radius: var(--radius-md); border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; transition: 0.2s; margin-bottom: 1rem; }
        .profile-info, .emergency-info { display: flex; align-items: center; gap: 1rem; }
        .profile-avatar, .emergency-avatar { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 1.2rem; }
        
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(4px); display: none; align-items: center; justify-content: center; z-index: 2000; padding: 1.5rem; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: white; border-radius: var(--radius-lg); width: 100%; max-width: 600px; max-height: 90vh; overflow-y: auto; position: relative; animation: slideUp 0.3s ease; }
        .modal-header { padding: 1.5rem; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; background: white; z-index: 10; }
        .modal-body { padding: 1.5rem; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .delete-btn { color: var(--danger); background: #fef2f2; border: none; padding: 0.5rem; border-radius: 8px; cursor: pointer; transition: 0.2s; display: flex; align-items: center; justify-content: center; }
        .delete-btn:hover { background: var(--danger); color: white; }

        .data-card { background: var(--bg); padding: 1rem; border-radius: var(--radius-md); margin-bottom: 0.75rem; border: 1px solid var(--border); }
        .sidebar-nav { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%); background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 0.75rem 2rem; border-radius: 40px; display: flex; gap: 2rem; box-shadow: 0 10px 25px -5px rgba(0,0,0,0.3); z-index: 1000; }
        .nav-link { color: rgba(255,255,255,0.6); text-decoration: none; display: flex; flex-direction: column; align-items: center; font-size: 0.7rem; gap: 4px; }
        .nav-link.active { color: white; }
    </style>
</head>
<body>

    <div class="container" style="padding-bottom: 8rem;">
        <header>
            <button class="back-btn" onclick="history.back()"><i data-lucide="arrow-left"></i></button>
            <div>
                <h1 style="font-size: 1.5rem; font-weight: 800;">Keluarga & Kontak Darurat</h1>
                <p style="color: var(--text-muted); font-size: 0.9rem;">Kelola profil anggota dan informasi kontak penting.</p>
            </div>
        </header>

        <section style="margin-bottom: 3rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem;">
                <h2 style="font-size: 1.1rem; color: var(--text-main); display: flex; align-items: center; gap: 0.5rem;">
                   <i data-lucide="users" style="color: var(--primary);"></i> Profil Tersimpan
                </h2>
                <button class="btn btn-primary" onclick="openProfileModal()"><i data-lucide="user-plus"></i> Tambah</button>
            </div>
            <div id="profileList"></div>
        </section>

        <section style="border-top: 2px dashed var(--border); padding-top: 3rem;">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2 style="font-size: 1.1rem; font-weight: 800; display: flex; align-items: center; gap: 0.75rem;">
                    <i data-lucide="phone-forwarded" style="color: var(--warning);"></i> Kontak Darurat Global
                </h2>
                <button class="btn btn-outline" style="color: var(--warning); border-color: var(--warning);" onclick="openEmergencyModal()">
                    <i data-lucide="plus"></i> Tambah
                </button>
            </div>
            <div id="emergencyList"></div>
        </section>
    </div>

    <!-- MODAL: PROFILE FORM -->
    <div id="profileModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="formTitle" style="font-size: 1.1rem; color: var(--primary);">Tambah Profil Baru</h2>
                <button onclick="closeProfileModal()" class="btn-outline" style="width:32px; height:32px; border-radius:50%; padding:0;"><i data-lucide="x" style="width:16px;"></i></button>
            </div>
            <div class="modal-body">
                <form id="profileForm">
                    <input type="hidden" id="editIndex" value="-1">
                    <div class="form-group"><label>Nama Lengkap</label><input type="text" id="name" required></div>
                    <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem;">
                        <div class="form-group"><label>Gender</label><select id="gender"><option value="Male">Laki-laki</option><option value="Female">Perempuan</option></select></div>
                        <div class="form-group"><label>Goldar</label><input type="text" id="bloodType"></div>
                        <div class="form-group"><label>Lahir</label><input type="date" id="dob" required></div>
                    </div>
                    <div class="form-group"><label>Tempat Lahir</label><input type="text" id="pob"></div>
                    <div style="border-top:1px solid var(--border); padding-top:1rem; margin:1rem 0;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:1rem;"><strong>Asuransi / BPJS</strong> <button type="button" class="btn btn-secondary" onclick="addInsuranceRow()" style="padding:0.2rem 0.5rem; font-size:0.7rem;">+ Tambah</button></div>
                        <div id="insuranceContainer"></div>
                    </div>
                    <div style="border-top:1px solid var(--border); padding-top:1rem; margin-bottom:1rem;">
                        <div style="display:flex; justify-content:space-between; margin-bottom:1rem;"><strong>Nomor Rekam Medis</strong> <button type="button" class="btn btn-secondary" onclick="addMedRecRow()" style="padding:0.2rem 0.5rem; font-size:0.7rem;">+ Tambah</button></div>
                        <div id="medRecContainer"></div>
                    </div>
                    <div class="form-group"><label>Catatan Medis</label><textarea id="notes" rows="2"></textarea></div>
                    <button type="submit" class="btn btn-primary" style="width:100%"><i data-lucide="save"></i> Simpan Profil</button>
                </form>
            </div>
        </div>
    </div>

    <!-- MODAL: EMERGENCY FORM -->
    <div id="emergencyModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h3>Tambah Kontak Darurat</h3>
                <button onclick="closeEmergencyModal()" class="btn-outline" style="width:32px; height:32px; border-radius:50%;"><i data-lucide="x" style="width:16px;"></i></button>
            </div>
            <div class="modal-body">
                <form id="emergencyForm">
                    <div class="form-group"><label>Nama</label><input type="text" id="eName" required></div>
                    <div class="form-group"><label>Hubungan</label><input type="text" id="eRelation" required></div>
                    <div class="form-group"><label>Telepon</label><input type="tel" id="ePhone" required></div>
                    <button type="submit" class="btn btn-primary" style="background:var(--warning); width:100%"><i data-lucide="phone"></i> Simpan</button>
                </form>
            </div>
        </div>
    </div>

    <!-- DETAIL MODAL -->
    <div id="detailModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="mName">Detail Profil</h2>
                <button onclick="closeModal()" class="btn-outline" style="width:32px; height:32px; border-radius:50%;"><i data-lucide="x" style="width:16px;"></i></button>
            </div>
            <div class="modal-body" id="mBody">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem; margin-bottom:1.5rem;">
                    <div><label>Gender</label><div id="mGender"></div></div>
                    <div><label>Darah</label><div id="mBlood"></div></div>
                </div>
                <div><label>Catatan Medis</label><div id="mNotes" style="background:var(--primary-light); padding:1rem; border-radius:8px;"></div></div>
            </div>
        </div>
    </div>

    <nav class="sidebar-nav">
        <a href="health-log.html" class="nav-link"><i data-lucide="clipboard-list"></i> Log</a>
        <a href="health-analytics.html" class="nav-link"><i data-lucide="line-chart"></i> Analisis</a>
        <a href="health-screening.html" class="nav-link"><i data-lucide="brain"></i> Skrining</a>
        <a href="health-reference.html" class="nav-link"><i data-lucide="book-open"></i> Referensi</a>
        <a href="health-settings.html" class="nav-link"><i data-lucide="settings"></i> Pengaturan</a>
    </nav>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            renderProfiles();
            renderEmergencyContacts();
        });

        let profiles = JSON.parse(localStorage.getItem('health_profiles_v2') || '[]');
        let emergencyContacts = JSON.parse(localStorage.getItem('health_emergency_contacts') || '[]');

        function saveAll() {
            localStorage.setItem('health_profiles_v2', JSON.stringify(profiles));
            localStorage.setItem('health_profiles', JSON.stringify(profiles.map(p => p.name)));
            localStorage.setItem('health_emergency_contacts', JSON.stringify(emergencyContacts));
        }

        window.openProfileModal = () => { resetForm(); document.getElementById('profileModal').classList.add('active'); };
        window.closeProfileModal = () => document.getElementById('profileModal').classList.remove('active');
        window.openEmergencyModal = () => { document.getElementById('emergencyForm').reset(); document.getElementById('emergencyModal').classList.add('active'); };
        window.closeEmergencyModal = () => document.getElementById('emergencyModal').classList.remove('active');
        window.closeModal = () => document.getElementById('detailModal').classList.remove('active');

        function addInsuranceRow(data = {}) {
            const div = document.createElement('div'); div.className = 'insurance-row'; div.style.display = 'flex'; div.style.gap = '5px'; div.style.marginBottom = '5px';
            div.innerHTML = `<input type="text" class="i-provider" placeholder="Asuransi" value="${data.provider||''}" style="flex:1">
                             <input type="text" class="i-number" placeholder="No." value="${data.number||''}" style="flex:1">
                             <button type="button" onclick="this.parentElement.remove()" class="delete-btn">×</button>`;
            document.getElementById('insuranceContainer').appendChild(div);
        }

        function addMedRecRow(data = {}) {
            const div = document.createElement('div'); div.className = 'medrec-row'; div.style.display = 'flex'; div.style.gap = '5px'; div.style.marginBottom = '5px';
            div.innerHTML = `<input type="text" class="m-hospital" placeholder="RS" value="${data.hospital||''}" style="flex:1">
                             <input type="text" class="m-number" placeholder="RM" value="${data.number||''}" style="flex:1">
                             <button type="button" onclick="this.parentElement.remove()" class="delete-btn">×</button>`;
            document.getElementById('medRecContainer').appendChild(div);
        }

        document.getElementById('profileForm').onsubmit = (e) => {
            e.preventDefault();
            const editIndex = parseInt(document.getElementById('editIndex').value);
            const data = {
                name: document.getElementById('name').value,
                gender: document.getElementById('gender').value,
                dob: document.getElementById('dob').value,
                pob: document.getElementById('pob').value,
                bloodType: document.getElementById('bloodType').value,
                notes: document.getElementById('notes').value,
                insurances: Array.from(document.querySelectorAll('.insurance-row')).map(r => ({ provider: r.querySelector('.i-provider').value, number: r.querySelector('.i-number').value })),
                medicalRecords: Array.from(document.querySelectorAll('.medrec-row')).map(r => ({ hospital: r.querySelector('.m-hospital').value, number: r.querySelector('.m-number').value }))
            };
            if(editIndex > -1) profiles[editIndex] = data; else profiles.push(data);
            saveAll(); renderProfiles(); closeProfileModal();
        };

        document.getElementById('emergencyForm').onsubmit = (e) => {
            e.preventDefault();
            emergencyContacts.push({ name: document.getElementById('eName').value, relation: document.getElementById('eRelation').value, phone: document.getElementById('ePhone').value });
            saveAll(); renderEmergencyContacts(); closeEmergencyModal();
        };

        function renderProfiles() {
            const list = document.getElementById('profileList');
            list.innerHTML = profiles.length ? profiles.map((p, idx) => `
                <div class="profile-card">
                    <div class="profile-info">
                        <div class="profile-avatar" style="background:${p.gender==='Female'?'#fdf2f8':'#eef2ff'}; color:${p.gender==='Female'?'#db2777':'#6366f1'}">${p.name[0]}</div>
                        <div><div style="font-weight:800;">${p.name}</div><div style="font-size:0.8rem; color:var(--text-muted);">${p.gender==='Male'?'Laki-laki':'Perempuan'} • ${p.bloodType}</div></div>
                    </div>
                    <div style="display:flex; gap:0.5rem;">
                        <button onclick="editProfile(${idx})" class="btn" style="padding:0.5rem; background:var(--primary-light); color:var(--primary);"><i data-lucide="edit-2" style="width:16px;"></i></button>
                        <button onclick="deleteProfile(${idx})" class="delete-btn"><i data-lucide="trash-2" style="width:16px;"></i></button>
                    </div>
                </div>
            `).join('') : '<div style="text-align:center; padding:3rem; color:var(--text-muted); border:2px dashed var(--border); border-radius:16px;">Belum ada profil.</div>';
            lucide.createIcons();
        }

        function renderEmergencyContacts() {
            const list = document.getElementById('emergencyList');
            list.innerHTML = emergencyContacts.length ? emergencyContacts.map((c, idx) => `
                <div class="emergency-card">
                    <div class="emergency-info">
                        <div class="emergency-avatar" style="background:#fffbeb; color:var(--warning);"><i data-lucide="phone"></i></div>
                        <div><div style="font-weight:700;">${c.name}</div><div style="font-size:0.8rem; color:var(--text-muted);">${c.relation} • ${c.phone}</div></div>
                    </div>
                    <div style="display:flex; gap:0.5rem;">
                        <a href="tel:${c.phone}" class="btn" style="background:var(--success); color:white; padding:0.5rem;"><i data-lucide="phone-call" style="width:16px;"></i></a>
                        <button onclick="deleteEmergency(${idx})" class="delete-btn"><i data-lucide="trash-2" style="width:16px;"></i></button>
                    </div>
                </div>
            `).join('') : '<div style="text-align:center; padding:2rem; color:var(--text-muted); font-size:0.85rem;">Belum ada kontak darurat.</div>';
            lucide.createIcons();
        }

        window.editProfile = (idx) => {
            const p = profiles[idx];
            document.getElementById('editIndex').value = idx;
            document.getElementById('name').value = p.name;
            document.getElementById('gender').value = p.gender;
            document.getElementById('dob').value = p.dob;
            document.getElementById('pob').value = p.pob;
            document.getElementById('bloodType').value = p.bloodType;
            document.getElementById('notes').value = p.notes;
            document.getElementById('insuranceContainer').innerHTML = ''; (p.insurances||[]).forEach(i => addInsuranceRow(i));
            document.getElementById('medRecContainer').innerHTML = ''; (p.medicalRecords||[]).forEach(m => addMedRecRow(m));
            document.getElementById('formTitle').innerText = 'Edit Profil';
            document.getElementById('profileModal').classList.add('active');
            lucide.createIcons();
        };

        window.deleteProfile = (idx) => { if(confirm('Hapus profil?')) { profiles.splice(idx, 1); saveAll(); renderProfiles(); } };
        window.deleteEmergency = (idx) => { if(confirm('Hapus kontak?')) { emergencyContacts.splice(idx, 1); saveAll(); renderEmergencyContacts(); } };
        function resetForm() { document.getElementById('profileForm').reset(); document.getElementById('editIndex').value = -1; document.getElementById('formTitle').innerText = 'Tambah Profil'; document.getElementById('insuranceContainer').innerHTML = ''; document.getElementById('medRecContainer').innerHTML = ''; }
        
        renderProfiles(); renderEmergencyContacts();
    </script>
</body>
</html>
