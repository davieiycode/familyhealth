<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>Daftarkan Anggota Keluarga · VitaFam</title>
  <meta name="theme-color" content="#030612">
  <link
    href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,300..700,0..1,0" />
  <style>
    :root {
      --bg: #030409;
      --bg-surface: #0a0e1a;
      --bg-glass: rgba(18, 22, 40, 0.7);
      --bg-glass-heavy: rgba(22, 28, 52, 0.98);
      --t: #00ffc3;
      --t-rgb: 0, 255, 195;
      --p: #bf95ff;
      --p-rgb: 191, 149, 255;
      --b: #4facfe;
      --b-rgb: 79, 172, 254;
      --r: #ff4d7a;
      --r-rgb: 255, 77, 122;
      --tx: #ffffff;
      --tx2: #f0f2f5;
      --tx3: #a0aec0;
      --bd: rgba(255, 255, 255, 0.15);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      background: var(--bg);
      color: var(--tx);
      font-family: 'Lexend', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 100px;
      background-image: 
        radial-gradient(circle at top left, rgba(var(--t-rgb), 0.05) 0%, transparent 40%),
        radial-gradient(circle at bottom right, rgba(var(--p-rgb), 0.05) 0%, transparent 40%);
    }

    .form-container { width: 100%; max-width: 600px; animation: slideUp 0.6s ease forwards; }
    @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 40px; }
    .brand { display: flex; align-items: center; gap: 12px; text-decoration: none; color: inherit; }
    .brand-logo { width: 44px; height: 44px; background: linear-gradient(135deg, var(--t), var(--b)); border-radius: 14px; display: flex; align-items: center; justify-content: center; color: #030612; }
    .brand-name { font-size: 1.4rem; font-weight: 800; }

    .card {
      background: var(--bg-glass-heavy);
      border: 1px solid var(--bd);
      border-radius: 32px;
      padding: 32px;
      margin-bottom: 24px;
      backdrop-filter: blur(20px);
    }

    .section-title { font-size: 1.1rem; font-weight: 700; color: var(--tx2); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; }
    .section-title .material-symbols-outlined { color: var(--p); font-size: 1.6rem; }

    .form-group { display: flex; flex-direction: column; gap: 8px; margin-bottom: 20px; }
    .form-label { font-size: 0.8rem; font-weight: 700; color: var(--tx3); text-transform: uppercase; letter-spacing: 0.5px; }
    
    .form-input {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 18px;
      padding: 16px 20px;
      color: var(--tx);
      font-family: inherit;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
      width: 100%;
    }
    .form-input:focus { border-color: var(--p); background: rgba(255,255,255,0.08); box-shadow: 0 0 20px rgba(var(--p-rgb), 0.1); }

    .grid-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    @media (max-width: 500px) { .grid-fields { grid-template-columns: 1fr; } }

    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, var(--p), var(--b));
      color: #030612;
      border: none;
      border-radius: 100px;
      padding: 22px;
      font-weight: 800;
      font-size: 1.15rem;
      cursor: pointer;
      box-shadow: 0 15px 40px rgba(var(--p-rgb), 0.3);
      transition: 0.3s;
      margin-top: 20px;
    }
    .btn-submit:hover { transform: translateY(-5px); box-shadow: 0 20px 50px rgba(var(--p-rgb), 0.5); filter: brightness(1.1); }

    .avatar-preview {
       width: 100px;
       height: 100px;
       border-radius: 30px;
       background: rgba(255,255,255,0.05);
       margin: 0 auto 30px;
       display: flex;
       align-items: center;
       justify-content: center;
       border: 2px dashed var(--p);
       color: var(--p);
       font-size: 2.5rem;
    }
  </style>
</head>

<body>
  <div class="form-container">
    <header>
      <a href="index.html" class="brand">
        <div class="brand-logo"><span class="material-symbols-outlined">health_and_safety</span></div>
        <div class="brand-name">VitaFam</div>
      </a>
      <a href="index.html" style="color: var(--tx3); text-decoration: none; font-size: 0.9rem; font-weight: 600;">Batal</a>
    </header>

    <div class="avatar-preview" id="avatar-icon">
       <span class="material-symbols-outlined" style="font-size: 3rem;">person_add</span>
    </div>

    <h1 style="font-size: 2rem; font-weight: 800; margin-bottom: 8px; text-align: center;">Profil Anggota Baru</h1>
    <p style="color: var(--tx3); margin-bottom: 40px; font-size: 1rem; text-align: center;">Daftarkan anggota keluarga Anda untuk mulai memantau perkembangan kesehatan mereka.</p>

    <div class="card">
       <div class="section-title"><span class="material-symbols-outlined">badge</span>Identitas Dasar</div>
       <div class="form-group">
          <label class="form-label">Nama Lengkap</label>
          <input type="text" id="p-name" class="form-input" placeholder="Contoh: Muhammad Alun">
       </div>
       <div class="grid-fields">
          <div class="form-group">
            <label class="form-label">Usia (Tahun)</label>
            <input type="number" id="p-age" class="form-input" placeholder="Thn">
          </div>
          <div class="form-group">
            <label class="form-label">Jenis Kelamin</label>
            <select id="p-gender" class="form-input">
               <option value="Male">Laki-laki</option>
               <option value="Female">Perempuan</option>
            </select>
          </div>
       </div>
       <div class="grid-fields">
          <div class="form-group">
            <label class="form-label">Status di Keluarga</label>
            <input type="text" id="p-status" class="form-input" placeholder="Anak, Istri, Ibu, dsb.">
          </div>
          <div class="form-group">
            <label class="form-label">Golongan Darah</label>
            <input type="text" id="p-blood" class="form-input" placeholder="A+, O-, dsb.">
          </div>
       </div>
    </div>

    <div class="card">
       <div class="section-title"><span class="material-symbols-outlined">monitoring</span>Data Fisik & Medis Awal</div>
       <div class="grid-fields">
          <div class="form-group">
            <label class="form-label">Berat Badan (kg)</label>
            <input type="number" id="p-weight" class="form-input" placeholder="kg">
          </div>
          <div class="form-group">
            <label class="form-label">Tinggi Dasar (cm)</label>
            <input type="number" id="p-height" class="form-input" placeholder="cm">
          </div>
       </div>
       <div class="form-group">
          <label class="form-label">Asuransi / BPJS</label>
          <input type="text" id="p-insurance" class="form-input" placeholder="Nama Asuransi atau No. BPJS">
       </div>
    </div>

    <button class="btn-submit" onclick="saveProfile()">Daftarkan Sekarang</button>
  </div>

  <div id="toast" style="position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: var(--t); color: #000; padding: 15px 30px; border-radius: 100px; font-weight: 700; box-shadow: 0 10px 30px rgba(0,0,0,0.4); display: none; z-index: 1000;">Berhasil Disimpan!</div>

  <script>
    function saveProfile() {
       const name = document.getElementById('p-name').value.trim();
       const age = document.getElementById('p-age').value.trim();
       const gender = document.getElementById('p-gender').value;
       const status = document.getElementById('p-status').value.trim();
       const blood = document.getElementById('p-blood').value.trim();
       const weight = document.getElementById('p-weight').value.trim();
       const height = document.getElementById('p-height').value.trim();
       const insurance = document.getElementById('p-insurance').value.trim();

       if (!name || !age) { alert('Nama dan Usia wajib diisi!'); return; }

       const PROFILES = JSON.parse(localStorage.getItem('vitaFamProfiles') || '[]');
       
       const newP = {
          id: 'p' + Date.now(),
          name: name,
          age: parseInt(age),
          gender: gender,
          status: status || (gender === 'Male' ? 'Laki-laki' : 'Perempuan'),
          blood: blood || '-',
          weight: parseInt(weight || 0),
          height: parseInt(height || 0),
          insurance: insurance || 'Tidak Ada',
          active: false,
          icon: gender === 'Male' ? (parseInt(age) > 18 ? 'person' : 'face') : (parseInt(age) > 18 ? 'person' : 'child_care'),
          color: '#' + Math.floor(Math.random()*16777215).toString(16),
          activePrograms: [],
          activeMeds: []
       };

       PROFILES.push(newP);
       localStorage.setItem('vitaFamProfiles', JSON.stringify(PROFILES));

       const toast = document.getElementById('toast');
       toast.style.display = 'block';
       setTimeout(() => {
          window.location.href = 'index.html';
       }, 1500);
    }
  </script>
</body>

</html>
